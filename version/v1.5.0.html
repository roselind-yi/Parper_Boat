<script>

const RT = ()=> VH*0.50, RB = ()=> VH*0.78, RM = ()=> (RT()+RB())/2;

// ═══════════════════════════════════════════

function drawFamilyCard(){

  cv.height = el.offsetHeight * devicePixelRatio;
  cv.style.width = el.offsetWidth+'px';
  cv.style.height = el.offsetHeight+'px';
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const w = el.offsetWidth, h = el.offsetHeight;

  // 背景——暖黄室内
  const bg = ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#f0e0b0');
  bg.addColorStop(0.5,'#e8c878');
  bg.addColorStop(1,'#c8984a');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,w,h);

  // 窗外夜色

  // 窗框
  ctx.strokeStyle='rgba(120,80,30,0.7)';
  ctx.lineWidth=3;
  ctx.strokeRect(w*0.12,h*0.04,w*0.76,h*0.34);
  // 窗格
  ctx.beginPath();
  ctx.moveTo(w*0.5,h*0.04); ctx.lineTo(w*0.5,h*0.38);
  ctx.moveTo(w*0.12,h*0.21); ctx.lineTo(w*0.88,h*0.21);
  ctx.strokeStyle='rgba(120,80,30,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
  // 窗外星点
  for(let i=0;i<12;i++){
    const sx=w*(0.12+Math.random()*0.76), sy=h*(0.04+Math.random()*0.17);

    ctx.fillStyle=`rgba(255,255,220,${0.5+Math.random()*0.5})`; ctx.fill();
  }
  // 红灯笼（窗外隐约）
  ctx.save();
  ctx.globalAlpha=0.35;
  for(let li=0;li<2;li++){
    const lx=w*(0.25+li*0.45), ly=h*0.08;
    ctx.fillStyle='#c0392b';
    ctx.beginPath(); ctx.ellipse(lx,ly+6,5,8,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(180,50,30,0.6)'; ctx.lineWidth=0.7;
    for(let s=0;s<4;s++){
      ctx.beginPath(); ctx.moveTo(lx-4,ly+2+s*2.5); ctx.lineTo(lx+4,ly+2+s*2.5); ctx.stroke();
    }
    ctx.fillStyle='rgba(255,180,0,0.8)';
    ctx.beginPath(); ctx.ellipse(lx,ly+6,1.5,2,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // 地面/墙
  ctx.fillStyle='rgba(200,155,70,0.3)';
  ctx.fillRect(0,h*0.38,w,h*0.62);

  // 餐桌（椭圆）
  ctx.save();
  ctx.translate(w*0.5, h*0.72);
  const tg = ctx.createRadialGradient(0,-5,0,0,0,w*0.42);
  tg.addColorStop(0,'rgba(160,100,40,0.9)');
  tg.addColorStop(1,'rgba(120,72,28,0.75)');
  ctx.fillStyle=tg;
  ctx.beginPath(); ctx.ellipse(0,0,w*0.42,h*0.16,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(80,48,16,0.5)'; ctx.lineWidth=1.2; ctx.stroke();

  // 碗碟
  const dishes=[
    {x:-w*0.22,y:0,r:w*0.08,color:'rgba(220,80,50,0.75)'},   // 红烧肉
    {x:0,y:-h*0.05,r:w*0.07,color:'rgba(200,180,100,0.7)'},  // 汤
    {x:w*0.2,y:h*0.02,r:w*0.07,color:'rgba(100,160,80,0.7)'},// 青菜
    {x:-w*0.05,y:h*0.07,r:w*0.055,color:'rgba(210,170,80,0.7)'},
  ];
  dishes.forEach(d=>{
    ctx.beginPath(); ctx.ellipse(d.x,d.y,d.r,d.r*0.5,0,0,Math.PI*2);
    ctx.fillStyle=d.color; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=0.8; ctx.stroke();
  });
  // 热气（蒸汽线）
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  for(let si=0;si<4;si++){
    const sx=(-w*0.22+w*0.44*(si/3));
    ctx.beginPath();
    ctx.moveTo(sx,h*-0.06);
    ctx.bezierCurveTo(sx-5,h*-0.12, sx+5,h*-0.18, sx,h*-0.22);
    ctx.stroke();
  }

  // 筷子
  ctx.strokeStyle='rgba(120,72,28,0.7)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(w*0.1,h*0.06); ctx.lineTo(w*0.18,h*-0.04); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w*0.13,h*0.07); ctx.lineTo(w*0.21,h*-0.03); ctx.stroke();
  ctx.restore();

  // 灯光光晕
  const lg=ctx.createRadialGradient(w*0.5,h*0.45,0,w*0.5,h*0.45,w*0.5);
  lg.addColorStop(0,'rgba(255,220,120,0.22)');
  lg.addColorStop(1,'rgba(255,220,120,0)');
  ctx.fillStyle=lg; ctx.fillRect(0,h*0.3,w,h*0.5);

  // 底部文字暗示
  ctx.fillStyle='rgba(120,80,30,0.45)';
  ctx.font=`${w*0.07}px Noto Serif SC,serif`;
  ctx.textAlign='center';
  ctx.fillText('除夕·家',w*0.5,h*0.95);
}

function drawFriendCard(){
  const el = document.getElementById('card-friend');
  const cv = document.getElementById('canvas-friend');
  cv.width = el.offsetWidth * devicePixelRatio;
  cv.height = el.offsetHeight * devicePixelRatio;
  cv.style.width = el.offsetWidth+'px';
  cv.style.height = el.offsetHeight+'px';
  const ctx = cv.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const w = el.offsetWidth, h = el.offsetHeight;

  // 背景——教室下午光
  const bg = ctx.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#e8eef5');
  bg.addColorStop(0.6,'#d8e8f0');
  bg.addColorStop(1,'#c8d8e8');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

  // 阳光斜射（右侧窗）
  ctx.save();
  const sg=ctx.createLinearGradient(w,0,w*0.3,h);
  sg.addColorStop(0,'rgba(255,240,180,0.18)');
  sg.addColorStop(1,'rgba(255,240,180,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,0,w,h);
  ctx.restore();

  // 黑板（主体）
  const bx=w*0.06, by=h*0.05, bw=w*0.88, bh=h*0.52;
  ctx.fillStyle='#2d4a3a';
  ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='rgba(80,60,30,0.6)'; ctx.lineWidth=3; ctx.strokeRect(bx,by,bw,bh);
  // 黑板木框高光
  ctx.fillStyle='rgba(140,100,40,0.4)';
  ctx.fillRect(bx,by,bw,4); ctx.fillRect(bx,by+bh-4,bw,4);
  ctx.fillRect(bx,by,4,bh); ctx.fillRect(bx+bw-4,by,4,bh);

  // 黑板内容——"毕业快乐"
  ctx.save();
  ctx.font=`bold ${w*0.12}px Noto Serif SC,serif`;
  ctx.textAlign='center';
  // 粉笔质感：多次绘制轻微偏移
  for(let pi=0;pi<3;pi++){
    ctx.fillStyle=`rgba(235,228,210,${0.25+pi*0.15})`;
    ctx.fillText('毕业快乐', w*0.5+(Math.random()-0.5)*0.8, h*0.28+(Math.random()-0.5)*0.5);
  }
  // 装饰小图案（粉笔画：五角星、花）
  ctx.strokeStyle='rgba(235,228,210,0.4)'; ctx.lineWidth=0.8;
  // 左侧星
  drawChalkStar(ctx, w*0.15, h*0.16, 10);
  drawChalkStar(ctx, w*0.22, h*0.44, 7);
  // 右侧花
  drawChalkFlower(ctx, w*0.82, h*0.18, 9);
  drawChalkFlower(ctx, w*0.76, h*0.43, 6);
  // 粉笔灰（底部）
  ctx.fillStyle='rgba(235,228,210,0.12)';
  ctx.fillRect(bx+2,by+bh-16,bw-4,14);
  ctx.restore();

  // 粉笔槽
  ctx.fillStyle='rgba(140,100,40,0.5)'; ctx.fillRect(bx,by+bh,bw,6);
  // 粉笔
  const chalkColors=['rgba(235,228,210,0.8)','rgba(210,130,120,0.7)','rgba(130,180,130,0.7)'];
  chalkColors.forEach((c,ci)=>{
    const cx2=bx+bw*0.25+ci*bw*0.2;
    ctx.fillStyle=c;
    ctx.fillRect(cx2,by+bh+1,w*0.1,4);
  });

  // 课桌（透视感）
  ctx.save();
  ctx.fillStyle='rgba(180,148,90,0.35)';
  const deskY=h*0.68;
  // 两排桌子（前排空着）
  for(let row=0;row<2;row++){
    for(let col=0;col<3;col++){
      const dx=w*(0.05+col*0.32), dy=deskY+row*h*0.1;
      const dw2=w*0.27, dh2=h*0.07;
      ctx.beginPath();
      ctx.moveTo(dx,dy+dh2);
      ctx.lineTo(dx+dw2*0.15,dy);
      ctx.lineTo(dx+dw2,dy);
      ctx.lineTo(dx+dw2*0.85,dy+dh2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle='rgba(120,90,40,0.3)'; ctx.lineWidth=0.8; ctx.stroke();
    }
  }
  ctx.restore();

  // 窗（右侧）
  ctx.strokeStyle='rgba(100,130,160,0.4)'; ctx.lineWidth=1.5;
  ctx.strokeRect(w*0.78,h*0.58,w*0.2,h*0.3);
  ctx.beginPath();
  ctx.moveTo(w*0.88,h*0.58); ctx.lineTo(w*0.88,h*0.88);
  ctx.moveTo(w*0.78,h*0.73); ctx.lineTo(w*0.98,h*0.73);
  ctx.stroke();
  // 窗外天色
  ctx.fillStyle='rgba(180,210,235,0.3)';
  ctx.fillRect(w*0.78,h*0.58,w*0.2,h*0.3);

  // 底部文字
  ctx.fillStyle='rgba(60,90,120,0.4)';
  ctx.font=`${w*0.07}px Noto Serif SC,serif`;
  ctx.textAlign='center';
  ctx.fillText('毕业·友',w*0.5,h*0.96);
}

function drawChalkStar(ctx,cx,cy,r){
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=i*Math.PI*2/5-Math.PI/2;
    const a2=a+Math.PI/5;
    i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.lineTo(cx+r*0.4*Math.cos(a2),cy+r*0.4*Math.sin(a2));
  }
  ctx.closePath(); ctx.stroke();
}
function drawChalkFlower(ctx,cx,cy,r){
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3;
    ctx.beginPath();
    ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),r*0.5,0,Math.PI*2);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx,cy,r*0.4,0,Math.PI*2); ctx.stroke();
}

function inkStroke(ctx,x0,y0,x1,y1,width,alpha,segs){
  segs=segs||12;
  const dx=(x1-x0)/segs, dy=(y1-y0)/segs;
  for(let i=0;i<segs;i++){
    if(Math.random()<0.11) continue;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x0+dx*i+(Math.random()-0.5)*width*0.4, y0+dy*i+(Math.random()-0.5)*width*0.25);
    ctx.lineTo(x0+dx*(i+1)+(Math.random()-0.5)*width*0.4, y0+dy*(i+1)+(Math.random()-0.5)*width*0.25);
    ctx.strokeStyle=`rgba(26,20,16,${alpha*(0.65+Math.random()*0.65)})`;
    ctx.lineWidth=width*(0.45+Math.random()*0.85);
    ctx.lineCap='round'; ctx.stroke(); ctx.restore();
  }
}
function inkCurve(ctx,pts,width,alpha){
  for(let s=0;s<3;s++){
    ctx.save(); ctx.beginPath();
    ctx.moveTo(pts[0][0]+(Math.random()-0.5)*width*0.3, pts[0][1]+(Math.random()-0.5)*width*0.2);
    for(let i=1;i<pts.length-1;i++){
      const mx=(pts[i][0]+pts[i+1][0])/2+(Math.random()-0.5)*width*0.5;
      const my=(pts[i][1]+pts[i+1][1])/2+(Math.random()-0.5)*width*0.3;
      ctx.quadraticCurveTo(pts[i][0]+(Math.random()-0.5)*2, pts[i][1]+(Math.random()-0.5)*2, mx, my);
    }
    ctx.lineTo(pts[pts.length-1][0], pts[pts.length-1][1]);
    ctx.strokeStyle=`rgba(26,20,16,${alpha*(0.55+Math.random()*0.55)})`;
    ctx.lineWidth=width*(0.35+Math.random()*0.9)*(1-s*0.18);
    if(Math.random()>0.14) ctx.stroke();
    ctx.restore();
  }
}
function riverYAt(x,side,rTop,rBot){
  const base=side==='top'?rTop:rBot;
  return base+Math.sin(x*0.0014)*10+Math.sin(x*0.003+1)*5+Math.sin(x*0.008+2.5)*2.5;
}

let cvMountain,cvMist,cvMid,cvNear,ctxWater;
function buildLayers(){
  VW=window.innerWidth; VH=window.innerHeight;
  const rTop=RT(), rBot=RB();

  cvMountain=document.createElement('canvas');
  cvMountain.width=Math.ceil(WORLD_W*PAR.mountain)+VW; cvMountain.height=VH;
  buildMountainLayer(cvMountain.getContext('2d'),cvMountain.width,VH,rTop);

  cvMist=document.createElement('canvas');
  cvMist.width=Math.ceil(WORLD_W*PAR.mist)+VW; cvMist.height=VH;
  buildMistLayer(cvMist.getContext('2d'),cvMist.width,VH,rTop);

  cvMid=document.createElement('canvas');
  cvMid.width=Math.ceil(WORLD_W*PAR.mid)+VW; cvMid.height=VH;
  buildMidLayer(cvMid.getContext('2d'),cvMid.width,VH,rTop,rBot);

  cvNear=document.createElement('canvas');
  cvNear.width=Math.ceil(WORLD_W*PAR.near)+VW; cvNear.height=VH;
  buildNearLayer(cvNear.getContext('2d'),cvNear.width,VH,rTop,rBot);

  const wc=document.getElementById('layer-water');
  wc.width=VW; wc.height=VH; ctxWater=wc.getContext('2d');
  const pc=document.getElementById('layer-particles');
  pc.width=VW; pc.height=VH;
  ['layer-mountain','layer-mist','layer-mid','layer-near'].forEach(id=>{
    const c=document.getElementById(id); c.width=VW; c.height=VH;
  });
}

function buildMountainLayer(ctx,W,H,rTop){
  [{amp:100,freq:0.00055,alpha:0.022,blur:6,oY:0.88},{amp:70,freq:0.0009,alpha:0.032,blur:4,oY:0.92},{amp:45,freq:0.0016,alpha:0.042,blur:2,oY:0.96}].forEach(l=>{
    ctx.save(); if(l.blur) ctx.filter=`blur(${l.blur}px)`;
    ctx.beginPath();
    const base=rTop*l.oY;
    ctx.moveTo(0,base);
    for(let x=0;x<=W;x+=6){
      ctx.lineTo(x, base-Math.abs(Math.sin(x*l.freq+0.5))*l.amp-Math.abs(Math.sin(x*l.freq*1.8+1.3))*l.amp*0.45-Math.abs(Math.sin(x*l.freq*0.6+2.2))*l.amp*0.3);
    }
    ctx.lineTo(W,rTop); ctx.lineTo(0,rTop); ctx.closePath();
    const g=ctx.createLinearGradient(0,rTop*0.3,0,rTop);
    g.addColorStop(0,`rgba(30,25,18,0)`); g.addColorStop(0.5,`rgba(30,25,18,${l.alpha*0.6})`); g.addColorStop(1,`rgba(30,25,18,${l.alpha})`);
    ctx.fillStyle=g; ctx.fill(); ctx.filter='none'; ctx.restore();
    ctx.save(); if(l.blur) ctx.filter=`blur(${l.blur*0.5}px)`;
    ctx.beginPath();
    const base2=rTop*l.oY;
    for(let x=0;x<=W;x+=8){
      const y=base2-Math.abs(Math.sin(x*l.freq+0.5))*l.amp-Math.abs(Math.sin(x*l.freq*1.8+1.3))*l.amp*0.45-Math.abs(Math.sin(x*l.freq*0.6+2.2))*l.amp*0.3;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(26,20,16,${l.alpha*1.3})`; ctx.lineWidth=1.1-l.alpha*6; ctx.stroke();
    ctx.filter='none'; ctx.restore();
  });
}
function buildMistLayer(ctx,W,H,rTop){
  for(let x=80;x<W;x+=110+Math.random()*80){
    const h2=50+Math.random()*80,alpha=0.04+Math.random()*0.045,by=rTop-5;
    ctx.save(); ctx.filter='blur(3.5px)';
    for(let ci=0;ci<4;ci++){
      ctx.beginPath(); ctx.arc(x+(Math.random()-0.5)*22,by-h2*0.6+Math.random()*22,14+Math.random()*26,0,Math.PI*2);
      ctx.fillStyle=`rgba(26,20,16,${alpha*(0.45+Math.random()*0.55)})`; ctx.fill();
    }
    ctx.beginPath(); ctx.moveTo(x,by); ctx.lineTo(x+(Math.random()-0.5)*5,by-h2*0.38);
    ctx.strokeStyle=`rgba(26,20,16,${alpha*1.5})`; ctx.lineWidth=2.2+Math.random()*1.5; ctx.stroke();
    ctx.filter='none'; ctx.restore();
  }
}
function buildMidLayer(ctx,W,H,rTop,rBot){
  const groves=[{cx:180,b:'top',n:6},{cx:480,b:'bot',n:4},{cx:850,b:'top',n:5},{cx:1300,b:'bot',n:5},{cx:1700,b:'top',n:7},{cx:2100,b:'bot',n:4},{cx:2500,b:'top',n:5},{cx:2900,b:'bot',n:6},{cx:3300,b:'top',n:4},{cx:3700,b:'bot',n:5},{cx:4100,b:'top',n:6},{cx:4600,b:'bot',n:4},{cx:5000,b:'top',n:5},{cx:5400,b:'bot',n:4}];
  groves.forEach(g=>drawBamboo(ctx,g.cx,g.b,g.n,rTop,rBot));
  [1050,2650,4350].forEach(cx=>drawBridge(ctx,cx,rTop,rBot));
}
function drawBamboo(ctx,cx,bank,count,rTop,rBot){
  for(let i=0;i<count;i++){
    const bx=cx+(i-count/2)*22+(Math.random()-0.5)*10;
    const h=90+Math.random()*70,by=bank==='top'?riverYAt(bx,'top',rTop,rBot):riverYAt(bx,'bot',rTop,rBot);
    const sign=bank==='top'?-1:1,alpha=0.52-i*0.03,nodeH=20+Math.random()*10;
    const pts=[];
    for(let n=0;n<=Math.ceil(h/nodeH);n++) pts.push([bx+Math.sin(n*1.2)*3,by+sign*n*nodeH]);
    for(let n=0;n<pts.length-1;n++){
      inkStroke(ctx,pts[n][0],pts[n][1],pts[n+1][0],pts[n+1][1],2.2-i*0.1,alpha,8);
      if(n>0){ctx.save();ctx.beginPath();ctx.moveTo(pts[n][0]-4,pts[n][1]);ctx.lineTo(pts[n][0]+4,pts[n][1]);ctx.strokeStyle=`rgba(45,62,36,${alpha*0.5})`;ctx.lineWidth=0.9;ctx.stroke();ctx.restore();}
    }
    for(let li=0;li<Math.floor(h/nodeH)-1;li++){
      if(Math.random()<0.45) continue;
      const lx=pts[li+1][0],ly=pts[li+1][1];
      for(let k=0;k<2+Math.floor(Math.random()*2);k++){
        const ang=(Math.random()-0.5)*1.4+(bank==='top'?-0.2:0.2),ll=16+Math.random()*12;
        ctx.save(); ctx.translate(lx+(Math.random()-0.5)*14,ly); ctx.rotate(ang);
        ctx.beginPath(); ctx.moveTo(0,0);
        ctx.bezierCurveTo(ll*0.25,-4+Math.random()*2,ll*0.7,-5+Math.random()*2,ll,0);
        ctx.bezierCurveTo(ll*0.7,4+Math.random()*2,ll*0.25,4+Math.random()*2,0,0);
        ctx.fillStyle=`rgba(40,62,32,${0.3+Math.random()*0.1})`; ctx.fill();
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ll,0);
        ctx.strokeStyle=`rgba(40,62,32,${0.16+Math.random()*0.08})`; ctx.lineWidth=0.5; ctx.stroke();
        ctx.restore();
      }
    }
  }
}
function drawBridge(ctx,cx,rTop,rBot){
  const ty=riverYAt(cx,'top',rTop,rBot),by=riverYAt(cx,'bot',rTop,rBot),bw=100,archH=36;
  ctx.save();
  inkStroke(ctx,cx-bw/2-5,ty-18,cx-bw/2-5,by+8,12,0.3,10);
  inkStroke(ctx,cx+bw/2+5,ty-18,cx+bw/2+5,by+8,12,0.28,10);
  inkStroke(ctx,cx-bw/2-12,ty-20,cx+bw/2+12,ty-20,14,0.32,18);
  inkStroke(ctx,cx-bw/2-12,ty-14,cx+bw/2+12,ty-14,6,0.2,15);
  ctx.save(); ctx.globalCompositeOperation='destination-out';
  ctx.beginPath(); ctx.ellipse(cx,ty+archH*0.05,bw/2-14,archH-2,0,Math.PI,0); ctx.fill(); ctx.restore();
  inkCurve(ctx,[[cx-bw/2+14,ty],[cx-bw/4,ty-archH+5],[cx,ty-archH],[cx+bw/4,ty-archH+5],[cx+bw/2-14,ty]],2.2,0.38);
  for(let yi=0;yi<4;yi++) inkStroke(ctx,cx-bw/2-12,ty-20+yi*6,cx+bw/2+12,ty-20+yi*6,0.7,0.1,20);
  ctx.restore();
}
function buildNearLayer(ctx,W,H,rTop,rBot){
  const spots=[{cx:280,b:'bot',n:7},{cx:560,b:'top',n:5},{cx:950,b:'bot',n:8},{cx:1250,b:'top',n:6},{cx:1650,b:'bot',n:9},{cx:1950,b:'top',n:5},{cx:2300,b:'bot',n:7},{cx:2750,b:'top',n:6},{cx:3100,b:'bot',n:8},{cx:3550,b:'top',n:5},{cx:3900,b:'bot',n:7},{cx:4300,b:'top',n:6},{cx:4700,b:'bot',n:8},{cx:5100,b:'top',n:5},{cx:5500,b:'bot',n:7}];
  spots.forEach(r=>drawReedGroup(ctx,r.cx,r.b,r.n,rTop,rBot));
  for(let x=100;x<W;x+=170+Math.random()*110){
    const bank=Math.random()<0.5?'top':'bot';
    const by=bank==='top'?riverYAt(x,'top',rTop,rBot):riverYAt(x,'bot',rTop,rBot);
    const sign=bank==='top'?-1:1;
    for(let k=0;k<3+Math.floor(Math.random()*4);k++){
      const wx=x+(Math.random()-0.5)*28,wh=8+Math.random()*14;
      ctx.save(); ctx.beginPath();
      ctx.moveTo(wx,by); ctx.bezierCurveTo(wx+(Math.random()-0.5)*8,by+sign*wh*0.5,wx+(Math.random()-0.5)*6,by+sign*wh*0.85,wx+(Math.random()-0.5)*4,by+sign*wh);
      ctx.strokeStyle=`rgba(55,80,45,${0.2+Math.random()*0.1})`; ctx.lineWidth=0.8+Math.random()*0.5; ctx.stroke(); ctx.restore();
    }
  }
}
function drawReedGroup(ctx,cx,bank,count,rTop,rBot){
  for(let i=0;i<count;i++){
    const rx=cx+(i-count/2)*16+(Math.random()-0.5)*8;
    const h=60+Math.random()*50;
    const by=bank==='top'?riverYAt(rx,'top',rTop,rBot):riverYAt(rx,'bot',rTop,rBot);
    const sign=bank==='top'?-1:1,alpha=0.4-i*0.022;
    const midX=rx+(Math.random()-0.5)*12,tipX=rx+(Math.random()-0.5)*16,tipY=by+sign*h;
    ctx.save(); ctx.beginPath();
    ctx.moveTo(rx,by); ctx.bezierCurveTo(rx+(Math.random()-0.5)*6,by+sign*h*0.35,midX,by+sign*h*0.7,tipX,tipY);
    ctx.strokeStyle=`rgba(85,72,38,${alpha})`; ctx.lineWidth=1.1+Math.random()*0.5; ctx.lineCap='round'; ctx.stroke();
    const pLen=10+Math.random()*6;
    ctx.save(); ctx.translate(tipX,tipY+sign*pLen*0.5); ctx.rotate((Math.random()-0.5)*0.25);
    ctx.beginPath(); ctx.ellipse(0,0,2.5+Math.random(),pLen*0.6,0.05,0,Math.PI*2);
    ctx.fillStyle=`rgba(75,60,30,${alpha*0.9})`; ctx.fill();
    for(let m=0;m<5;m++){
      ctx.beginPath(); ctx.moveTo((Math.random()-0.5)*7,(Math.random()-0.5)*pLen*0.8);
      ctx.lineTo((Math.random()-0.5)*6+Math.random()*3,(Math.random()-0.5)*pLen*0.6+sign*4);
      ctx.strokeStyle=`rgba(75,60,30,${alpha*0.3})`; ctx.lineWidth=0.5; ctx.stroke();
    }
    ctx.restore(); ctx.restore();
  }
}

// 游戏启动
// ═══════════════════════════════════════════
function startGame(){
  switchPhase('phase-fold','phase-game');
  document.getElementById('phase-game').style.display='block';
  buildLayers();
  const bx=Math.floor(VW*0.28), by=Math.floor(RM()-28);
  const bw=document.getElementById('boat-wrap');
  bw.style.left=bx+'px'; bw.style.top=by+'px'; bw.style.position='fixed';
  const disp=G.boatText.length>6?G.boatText.slice(0,5)+'…':G.boatText;
  document.getElementById('boat-text-display').textContent=disp;
  // 烦恼文字
  const wt=document.getElementById('worry-text');
  wt.textContent=G.boatText||'';
  wt.style.left='50%'; wt.style.top=(RM()+20)+'px';
  wt.style.transform='translateX(-50%)';
  setupInteraction();
  G.gameRunning=true;
  G.raf=requestAnimationFrame(gameFrame);
}

// ═══════════════════════════════════════════
// 主游戏帧
// ═══════════════════════════════════════════
let lastT=0;
function gameFrame(t){
  if(!G.gameRunning) return;
  const dt=Math.min(t-lastT,50); lastT=t;
  G.waveT+=dt*0.001;
  if(!G.isStuck&&!G.storyPaused&&!G.shorePaused){
    G.boatWorldX+=G.boatSpeed;
    document.getElementById('progress-fill').style.width=(G.boatWorldX/WORLD_W*100)+'%';
    checkObstacles();
    checkScenes();
    updateWorryText();
    if(G.boatWorldX>CHAPTERS.ch1.endX){ triggerShore(); return; }
  }
  renderLayers();
  updateSkyLight();
  renderParticles(dt);
  spawnParticles();
  const wave=Math.sin(G.boatWorldX*0.013+G.waveT)*7+Math.sin(G.boatWorldX*0.027+G.waveT*1.4)*3.5;
  document.getElementById('boat-wrap').style.top=(RM()-28+wave)+'px';
  G.raf=requestAnimationFrame(gameFrame);
}

// ═══════════════════════════════════════════
// 渲染层
// ═══════════════════════════════════════════
function renderLayers(){
  [{id:'layer-mountain',cv:cvMountain,par:PAR.mountain},{id:'layer-mist',cv:cvMist,par:PAR.mist},{id:'layer-mid',cv:cvMid,par:PAR.mid},{id:'layer-near',cv:cvNear,par:PAR.near}].forEach(l=>{
    const c=document.getElementById(l.id),ctx=c.getContext('2d');
    ctx.clearRect(0,0,VW,VH);
    ctx.drawImage(l.cv,G.boatWorldX*l.par,0,VW,VH,0,0,VW,VH);
  });
  renderWater();
}
function renderWater(){
  const ctx=ctxWater,rTop=RT(),rBot=RB();
  ctx.clearRect(0,0,VW,VH);
  ctx.save(); ctx.beginPath();
  for(let x=0;x<=VW;x+=4){
    const wx=x+G.boatWorldX,ty=rTop+Math.sin(wx*0.0014+G.waveT)*10+Math.sin(wx*0.003+1+G.waveT*0.7)*5;
    x===0?ctx.moveTo(x,ty):ctx.lineTo(x,ty);
  }
  ctx.lineTo(VW,rBot); ctx.lineTo(0,rBot); ctx.closePath();
  const wg=ctx.createLinearGradient(0,rTop,0,rBot);
  wg.addColorStop(0,'rgba(130,178,205,0.2)'); wg.addColorStop(0.45,'rgba(110,160,188,0.27)'); wg.addColorStop(1,'rgba(88,138,168,0.17)');
  ctx.fillStyle=wg; ctx.fill(); ctx.restore();
  // 岸线飞白
  for(let pass=0;pass<3;pass++){
    ctx.save(); ctx.beginPath(); let first=true;
    for(let x=0;x<=VW;x+=5){
      const wx=x+G.boatWorldX,ty=rTop+Math.sin(wx*0.0014+G.waveT)*10+Math.sin(wx*0.003+1+G.waveT*0.7)*5+(Math.random()-0.5)*(pass+1)*0.7;
      if(Math.random()<0.055){first=true;continue;}
      first?(ctx.moveTo(x,ty),first=false):ctx.lineTo(x,ty);
    }
    ctx.strokeStyle=`rgba(48,88,115,${0.34-pass*0.08})`; ctx.lineWidth=1.8-pass*0.4; ctx.stroke(); ctx.restore();
  }
  // 动态波纹
  const rH=rBot-rTop;
  for(let row=0;row<10;row++){
    const rowY=rTop+rH*(0.12+row*0.08),flowOff=(G.waveT*28+row*18)%85;
    for(let wx2=-flowOff;wx2<VW;wx2+=65+row*7){
      const wl=20+row*3+Math.sin(row+wx2)*7,wy=rowY+Math.sin((wx2+G.boatWorldX)*0.018+G.waveT+row)*4;
      if(Math.random()<0.09) continue;
      ctx.save(); ctx.beginPath(); ctx.moveTo(wx2,wy);
      ctx.bezierCurveTo(wx2+wl*0.33,wy-1.5+Math.random()*2,wx2+wl*0.66,wy+1.5+Math.random()*2,wx2+wl,wy);
      ctx.strokeStyle=`rgba(65,115,148,${0.09+Math.random()*0.07})`; ctx.lineWidth=0.5+Math.random()*0.35; ctx.stroke(); ctx.restore();
    }
  }
  // 障碍物
  drawObstacles(ctx,rTop,rBot);
}
function drawObstacles(ctx,rTop,rBot){
  const rMid=(rTop+rBot)/2;
  CHAPTERS.ch1.obstacles.forEach(ob=>{
    if(ob._gone) return;
    const sx=ob.x-G.boatWorldX;
    if(sx<-80||sx>VW+80) return;
    if(ob.type==='rock'){
      ctx.save();
      ctx.filter='blur(2px)'; ctx.fillStyle='rgba(26,20,16,0.1)';
      ctx.beginPath(); ctx.ellipse(sx+5,rMid+ob.size*0.3+3,ob.size*0.85,ob.size*0.3,0.1,0,Math.PI*2); ctx.fill(); ctx.filter='none';
      ctx.beginPath();
      ctx.moveTo(sx-ob.size,rMid+ob.size*0.1);
      ctx.bezierCurveTo(sx-ob.size*0.8,rMid-ob.size*0.55,sx-ob.size*0.15,rMid-ob.size*0.7,sx+ob.size*0.1,rMid-ob.size*0.55);
      ctx.bezierCurveTo(sx+ob.size*0.55,rMid-ob.size*0.65,sx+ob.size*0.9,rMid-ob.size*0.28,sx+ob.size,rMid+ob.size*0.1);
      ctx.bezierCurveTo(sx+ob.size*0.7,rMid+ob.size*0.48,sx-ob.size*0.6,rMid+ob.size*0.48,sx-ob.size,rMid+ob.size*0.1);
      const sg=ctx.createRadialGradient(sx-ob.size*0.3,rMid-ob.size*0.2,0,sx,rMid,ob.size*1.1);
      sg.addColorStop(0,'rgba(88,78,65,0.75)'); sg.addColorStop(0.65,'rgba(58,50,40,0.68)'); sg.addColorStop(1,'rgba(38,32,25,0.55)');
      ctx.fillStyle=sg; ctx.fill();
      ctx.beginPath(); ctx.ellipse(sx-ob.size*0.28,rMid-ob.size*0.22,ob.size*0.22,ob.size*0.1,-0.4,0,Math.PI*2);
      ctx.fillStyle='rgba(255,250,240,0.18)'; ctx.fill();
      for(let ri=1;ri<=4;ri++){
        ctx.beginPath(); ctx.ellipse(sx,rMid+ob.size*0.12,ob.size*(0.85+ri*0.42),ob.size*(0.22+ri*0.07),0,0,Math.PI*2);
        ctx.strokeStyle=`rgba(80,128,158,${0.17-ri*0.03})`; ctx.lineWidth=0.6; ctx.stroke();
      }
      ctx.restore();
    } else if(ob.type==='weed'){
      const count=4+Math.floor(ob.size/5);
      for(let i=0;i<count;i++){
        const wx=sx+(i-count/2)*14+(Math.random()*4-2),wh=16+Math.random()*20;
        ctx.save(); ctx.beginPath();
        ctx.moveTo(wx,rBot-6); ctx.bezierCurveTo(wx+(Math.random()-0.5)*12,rBot-wh*0.45,wx+(Math.random()-0.5)*10,rBot-wh*0.8,wx+(Math.random()-0.5)*6,rBot-wh);
        ctx.strokeStyle=`rgba(48,88,52,${0.27+Math.random()*0.1})`; ctx.lineWidth=1.1+Math.random()*0.5; ctx.lineCap='round'; ctx.stroke();
        ctx.beginPath(); ctx.ellipse(wx+(Math.random()-0.5)*8,rBot-wh-4+Math.random()*5,6+Math.random()*4,2.5,0,0,Math.PI*2);
        ctx.fillStyle='rgba(48,88,52,0.18)'; ctx.fill(); ctx.restore();
      }
    } else if(ob.type==='whirlpool'){
      ctx.save(); ctx.translate(sx,rMid);
      for(let s=0;s<6;s++){
        const r=6+s*8,startAng=G.waveT*2.2+s*0.5;
        ctx.beginPath();
        for(let a=startAng;a<=startAng+Math.PI*1.6;a+=0.12){
          const rad=r*(1-(a-startAng)/(Math.PI*8)),px=rad*Math.cos(a),py=rad*0.45*Math.sin(a);
          a===startAng?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.strokeStyle=`rgba(65,118,155,${0.2-s*0.025})`; ctx.lineWidth=1.1-s*0.1; ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(0,0,2.5,0,Math.PI*2); ctx.fillStyle='rgba(65,118,155,0.22)'; ctx.fill();
      ctx.restore();
    }
  });
}
function updateSkyLight(){
  const p=G.boatWorldX/WORLD_W;
  let color=SKY[0].c;
  for(let i=0;i<SKY.length-1;i++){
    if(p>=SKY[i].t&&p<=SKY[i+1].t){color=SKY[i+1].c;break;}
  }
  document.getElementById('layer-sky').style.background=`radial-gradient(ellipse at 50% 0%,${color} 0%,transparent 70%)`;
}

// ═══════════════════════════════════════════
// 烦恼文字若隐若现
// ═══════════════════════════════════════════
function updateWorryText(){
  if(!G.boatText) return;
  const wt=document.getElementById('worry-text');
  // 被卡住时显现
  if(G.isStuck&&!G.worryVisible){
    G.worryVisible=true;
    wt.classList.add('surface');
    clearTimeout(G.worryTimer);
    G.worryTimer=setTimeout(()=>{
      wt.classList.remove('surface');
      G.worryVisible=false;
    }, 3500);
  }
}

// ═══════════════════════════════════════════
// 粒子
// ═══════════════════════════════════════════
let nFish=0,nLeaf=0,nBird=0;
function spawnParticles(){
  const now=G.waveT,rTop=RT(),rBot=RB(),rMid=RM();
  if(now>nFish&&!G.isStuck&&!G.storyPaused){
    nFish=now+2.2+Math.random()*4;
    G.particles.push({type:'fish',x:Math.random()*VW*0.8+VW*0.1,y:rMid+Math.random()*20-10,vx:1.5+Math.random()*2,vy:-(2+Math.random()*2),life:1.0,size:4+Math.random()*3});
  }
  if(now>nLeaf){
    nLeaf=now+1.4+Math.random()*2.5;
    G.particles.push({type:'leaf',x:Math.random()*VW,y:rTop+Math.random()*(rBot-rTop)*0.6,vx:0.3+Math.random()*0.45,vy:0.1+Math.random()*0.18,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.04,life:1.0,size:5+Math.random()*4});
  }
  if(now>nBird){
    nBird=now+4+Math.random()*6;
    G.particles.push({type:'bird',x:-20,y:RT()*0.42+Math.random()*RT()*0.3,vx:1.8+Math.random()*1.5,vy:-(0.3+Math.random()*0.4),life:1.0,wPhase:0});
  }
}
function renderParticles(dt){
  const pc=document.getElementById('layer-particles'),ctx=pc.getContext('2d'),rTop=RT(),rBot=RB();
  ctx.clearRect(0,0,VW,VH);
  for(let i=G.particles.length-1;i>=0;i--){
    const p=G.particles[i];
    p.life-=dt*0.00075;
    if(p.life<=0||p.x>VW+60||p.y<-40||p.y>VH+40){G.particles.splice(i,1);continue;}
    if(p.type==='fish'){
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.14;
      if(p.y>rTop+(rBot-rTop)*0.7){G.particles.splice(i,1);continue;}
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(Math.atan2(p.vy,p.vx));
      ctx.beginPath(); ctx.ellipse(0,0,p.size,p.size*0.38,0,0,Math.PI*2); ctx.fillStyle=`rgba(70,120,148,${p.life*0.42})`; ctx.fill();
      ctx.beginPath(); ctx.moveTo(-p.size,0); ctx.lineTo(-p.size-5,-3); ctx.lineTo(-p.size-5,3); ctx.closePath(); ctx.fillStyle=`rgba(60,108,135,${p.life*0.35})`; ctx.fill();
      ctx.restore();
    } else if(p.type==='leaf'){
      p.x+=p.vx; p.y+=p.vy*Math.sin(G.waveT+p.x*0.02); p.rot+=p.rotV;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.beginPath(); ctx.ellipse(0,0,p.size,p.size*0.42,0,0,Math.PI*2); ctx.fillStyle=`rgba(85,68,35,${p.life*0.2})`; ctx.fill();
      ctx.beginPath(); ctx.moveTo(-p.size,0); ctx.lineTo(p.size,0); ctx.strokeStyle=`rgba(85,68,35,${p.life*0.13})`; ctx.lineWidth=0.5; ctx.stroke();
      ctx.restore();
    } else if(p.type==='bird'){
      p.x+=p.vx; p.y+=p.vy; p.wPhase+=dt*0.006;
      const wAng=Math.sin(p.wPhase)*0.5;
      ctx.save(); ctx.translate(p.x,p.y); ctx.strokeStyle=`rgba(26,20,16,${p.life*0.35})`; ctx.lineWidth=1.1; ctx.lineCap='round';
      ctx.save(); ctx.rotate(-wAng); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,-4); ctx.stroke(); ctx.restore();
      ctx.save(); ctx.rotate(wAng); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(10,-4); ctx.stroke(); ctx.restore();
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════
// 障碍物 & 场景检测
// ═══════════════════════════════════════════
function checkObstacles(){
  for(let ob of CHAPTERS.ch1.obstacles){
    if(ob.passed) continue;
    if(Math.abs(G.boatWorldX-ob.x)<42){
      ob.passed=true;
      G.isStuck=true;
      document.getElementById('boat-wrap').classList.add('stuck');
      document.getElementById('swipe-hint').textContent=ob.label;
      document.getElementById('swipe-hint').classList.add('show');
      G.stuckTimer=setTimeout(()=>{ if(G.isStuck) unstuck(); },4500);
      break;
    }
  }
}
function unstuck(){
  G.isStuck=false;
  document.getElementById('boat-wrap').classList.remove('stuck');
  document.getElementById('swipe-hint').classList.remove('show');
  clearTimeout(G.stuckTimer);
  const orig=G.boatSpeed; G.boatSpeed=3.2;
  setTimeout(()=>{ G.boatSpeed=orig; },700);
  createRipple();
}
function checkScenes(){
  const sc=CHAPTERS.ch1.scenes;
  for(let i=0;i<sc.length;i++){
    if(G.shownScenes.has(i)) continue;
    if(G.boatWorldX>sc[i].x&&G.boatWorldX<sc[i].x+55){
      G.shownScenes.add(i); G.storyPaused=true;
      document.getElementById('story-location').textContent=sc[i].location;
      document.getElementById('story-text').textContent=sc[i].text;
      document.getElementById('story-card').classList.add('visible');
      showLocationLabel(sc[i].location);
    }
  }
}
function dismissStory(){
  document.getElementById('story-card').classList.remove('visible');
  setTimeout(()=>{ G.storyPaused=false; },300);
}
function showLocationLabel(txt){
  const el=document.getElementById('location-label');
  el.textContent=txt; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// 登岸（第三章预览：一户人家）

function triggerShore(){
  G.gameRunning=false;
  if(G.raf) cancelAnimationFrame(G.raf);
  G.shorePaused=true;

  setTimeout(()=>{
    switchPhase('phase-game','phase-shore');
    const story=SHORE_STORIES[G.path];

    // 图片接口：尝试加载对应图片
    const img=document.getElementById('shore-image');
    img.src=story.image;

    // Canvas兜底绘制
    const cv=document.getElementById('shore-canvas');
    cv.width=VW; cv.height=VH;
    drawShoreScene(cv.getContext('2d'),VW,VH,G.path);

    // 显示故事卡片
    setTimeout(()=>{
      document.getElementById('shore-location').textContent=story.location;
      document.getElementById('shore-text').textContent=story.text;
      document.getElementById('shore-story').classList.add('visible');
    },1200);
  },600);
}

// ═══════════════════════════════════════════
// 登岸Canvas画面（图片兜底）
// ═══════════════════════════════════════════
function drawShoreScene(ctx,W,H,path){
  if(path==='family'){
    drawFamilyShore(ctx,W,H);
  } else {
    drawFriendShore(ctx,W,H);
  }
}

function drawFamilyShore(ctx,W,H){
  // 宣纸底
  ctx.fillStyle='#f2ead8'; ctx.fillRect(0,0,W,H);
  // 夜空渐变
  const sky=ctx.createLinearGradient(0,0,0,H*0.55);
  sky.addColorStop(0,'rgba(28,22,45,0.55)');
  sky.addColorStop(1,'rgba(28,22,45,0)');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.55);
  // 星星
  for(let i=0;i<30;i++){
    const sx=Math.random()*W,sy=Math.random()*H*0.35;
    ctx.beginPath(); ctx.arc(sx,sy,0.7+Math.random()*0.8,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,220,${0.4+Math.random()*0.6})`; ctx.fill();
  }
  // 远山
  ctx.save(); ctx.filter='blur(4px)';
  ctx.beginPath(); ctx.moveTo(0,H*0.38);
  for(let x=0;x<=W;x+=8) ctx.lineTo(x,H*0.38-Math.abs(Math.sin(x*0.004))*H*0.15-Math.abs(Math.sin(x*0.009+1))*H*0.08);
  ctx.lineTo(W,H*0.55); ctx.lineTo(0,H*0.55); ctx.closePath();
  ctx.fillStyle='rgba(26,20,16,0.06)'; ctx.fill(); ctx.filter='none'; ctx.restore();

  // 地面（水墨晕染）
  const ground=ctx.createLinearGradient(0,H*0.55,0,H);
  ground.addColorStop(0,'rgba(180,155,110,0.18)');
  ground.addColorStop(1,'rgba(160,135,90,0.08)');
  ctx.fillStyle=ground; ctx.fillRect(0,H*0.52,W,H*0.48);

  // 院墙（水墨）
  inkStroke(ctx,W*0.05,H*0.72,W*0.38,H*0.72,8,0.28,25);
  inkStroke(ctx,W*0.62,H*0.72,W*0.95,H*0.72,8,0.28,25);
  inkStroke(ctx,W*0.05,H*0.55,W*0.05,H*0.72,8,0.26,12);
  inkStroke(ctx,W*0.95,H*0.55,W*0.95,H*0.72,8,0.26,12);

  // 房屋主体（水墨立面）
  const hx=W*0.22,hy=H*0.32,hw=W*0.56,hh=H*0.42;
  // 墙体
  inkStroke(ctx,hx,hy+hh,hx,hy+hh*0.15,10,0.35,15);
  inkStroke(ctx,hx+hw,hy+hh,hx+hw,hy+hh*0.15,10,0.33,15);
  inkStroke(ctx,hx,hy+hh,hx+hw,hy+hh,6,0.3,30);
  // 屋顶（飞檐感）
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(hx-W*0.06,hy+hh*0.18);
  ctx.bezierCurveTo(hx+hw*0.1,hy-H*0.03, hx+hw*0.4,hy-H*0.06, hx+hw*0.5,hy-H*0.08);
  ctx.bezierCurveTo(hx+hw*0.6,hy-H*0.06, hx+hw*0.9,hy-H*0.03, hx+hw+W*0.06,hy+hh*0.18);
  ctx.lineTo(hx+hw+W*0.04,hy+hh*0.2); ctx.lineTo(hx-W*0.04,hy+hh*0.2); ctx.closePath();
  const roofG=ctx.createLinearGradient(0,hy-H*0.08,0,hy+hh*0.22);
  roofG.addColorStop(0,'rgba(38,32,25,0.72)'); roofG.addColorStop(1,'rgba(55,45,32,0.55)');
  ctx.fillStyle=roofG; ctx.fill();
  // 瓦片线
  ctx.strokeStyle='rgba(26,20,16,0.08)'; ctx.lineWidth=0.8;
  for(let ti=0;ti<12;ti++){
    ctx.beginPath(); ctx.moveTo(hx-W*0.04+ti*(hw+W*0.08)/12,hy+hh*0.2);
    ctx.lineTo(hx+hw*0.5-W*0.04+(ti-5.5)*0.6,hy-H*0.08); ctx.stroke();
  }
  ctx.restore();

  // 门（正中）
  const dx=hx+hw*0.38,dy=hy+hh*0.42,dw=hw*0.24,dh=hh*0.52;
  ctx.save();
  // 门框
  inkStroke(ctx,dx,dy+dh,dx,dy,4,0.45,10);
  inkStroke(ctx,dx+dw,dy+dh,dx+dw,dy,4,0.45,10);
  inkStroke(ctx,dx,dy,dx+dw,dy,4,0.4,8);
  // 门板（暖光透出）
  const doorG=ctx.createRadialGradient(dx+dw*0.5,dy+dh*0.5,0,dx+dw*0.5,dy+dh*0.5,dh*0.6);
  doorG.addColorStop(0,'rgba(240,190,100,0.35)');
  doorG.addColorStop(1,'rgba(180,120,50,0.08)');
  ctx.fillStyle=doorG; ctx.fillRect(dx,dy,dw,dh);
  // 门缝
  inkStroke(ctx,dx+dw*0.5,dy,dx+dw*0.5,dy+dh,1.5,0.25,8);
  ctx.restore();

  // 窗户（两侧，透暖光）
  [[hx+hw*0.08,hy+hh*0.35],[hx+hw*0.68,hy+hh*0.35]].forEach(([wx,wy])=>{
    const ww=hw*0.18,wh2=hh*0.28;
    const winG=ctx.createRadialGradient(wx+ww/2,wy+wh2/2,0,wx+ww/2,wy+wh2/2,ww*0.8);
    winG.addColorStop(0,'rgba(255,210,100,0.42)');
    winG.addColorStop(1,'rgba(220,160,60,0.08)');
    ctx.fillStyle=winG; ctx.fillRect(wx,wy,ww,wh2);
    inkStroke(ctx,wx,wy,wx+ww,wy,2,0.35,8);
    inkStroke(ctx,wx,wy+wh2,wx+ww,wy+wh2,2,0.35,8);
    inkStroke(ctx,wx,wy,wx,wy+wh2,2,0.35,6);
    inkStroke(ctx,wx+ww,wy,wx+ww,wy+wh2,2,0.35,6);
    inkStroke(ctx,wx+ww*0.5,wy,wx+ww*0.5,wy+wh2,1,0.2,5);
  });

  // 灯笼（门口两侧）
  [[dx-W*0.05,dy-H*0.04],[dx+dw+W*0.02,dy-H*0.04]].forEach(([lx,ly])=>{
    ctx.save();
    ctx.fillStyle='rgba(180,40,30,0.75)';
    ctx.beginPath(); ctx.ellipse(lx,ly+H*0.04,W*0.015,H*0.032,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(140,25,20,0.5)'; ctx.lineWidth=0.7;
    for(let s=0;s<5;s++){
      ctx.beginPath(); ctx.moveTo(lx-W*0.013,ly+H*0.024+s*H*0.009); ctx.lineTo(lx+W*0.013,ly+H*0.024+s*H*0.009); ctx.stroke();
    }
    const lg2=ctx.createRadialGradient(lx,ly+H*0.04,0,lx,ly+H*0.04,W*0.06);
    lg2.addColorStop(0,'rgba(255,150,50,0.2)'); lg2.addColorStop(1,'rgba(255,150,50,0)');
    ctx.fillStyle=lg2; ctx.fillRect(lx-W*0.06,ly-H*0.02,W*0.12,H*0.12);
    ctx.restore();
  });

  // 炊烟
  ctx.save(); ctx.strokeStyle='rgba(180,160,120,0.18)'; ctx.lineWidth=2.5;
  for(let si=0;si<3;si++){
    ctx.beginPath();
    ctx.moveTo(hx+hw*0.3+si*hw*0.2, hy-H*0.01);
    ctx.bezierCurveTo(hx+hw*0.28+si*hw*0.2-8,hy-H*0.06, hx+hw*0.32+si*hw*0.2+6,hy-H*0.12, hx+hw*0.3+si*hw*0.2,hy-H*0.18);
    ctx.stroke();
  }
  ctx.restore();

  // 石板小路
  for(let pi=0;pi<5;pi++){
    const px=hx+hw*0.38+dw*0.5-W*0.025+pi*W*0.01, py=hy+hh*0.95+pi*H*0.018;
    ctx.save(); ctx.translate(px,py); ctx.rotate(Math.random()*0.3-0.15);
    ctx.beginPath(); ctx.ellipse(0,0,W*0.025,H*0.012,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(140,120,90,${0.18+Math.random()*0.1})`; ctx.fill();
    ctx.strokeStyle='rgba(100,80,55,0.12)'; ctx.lineWidth=0.6; ctx.stroke();
    ctx.restore();
  }

  // 水墨晕染角落
  ctx.save(); ctx.filter='blur(18px)';
  ctx.fillStyle='rgba(26,20,16,0.04)'; ctx.fillRect(0,0,W*0.2,H);
  ctx.fillRect(W*0.8,0,W*0.2,H);
  ctx.filter='none'; ctx.restore();

  // 落款
  ctx.save(); ctx.font=`${Math.min(W,H)*0.022}px Noto Serif SC,serif`; ctx.fillStyle='rgba(26,20,16,0.2)';
  ctx.textAlign='right'; ctx.fillText('家',W*0.96,H*0.96); ctx.restore();
}

function drawFriendShore(ctx,W,H){
  // 宣纸底（偏冷）
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#eef2f5'); bg.addColorStop(1,'#e2e8ec');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // 阳光斜射
  ctx.save();
  const sg=ctx.createLinearGradient(W,0,W*0.2,H);
  sg.addColorStop(0,'rgba(255,245,200,0.2)'); sg.addColorStop(1,'rgba(255,245,200,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H); ctx.restore();

  // 远处操场/操场跑道（淡淡）
  ctx.save(); ctx.filter='blur(5px)';
  ctx.beginPath(); ctx.ellipse(W*0.5,H*0.78,W*0.4,H*0.08,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(180,140,90,0.15)'; ctx.lineWidth=8; ctx.stroke();
  ctx.filter='none'; ctx.restore();

  // 教室外墙
  const bx=W*0.08,by=H*0.15,bw=W*0.84,bh=H*0.65;
  ctx.fillStyle='rgba(220,215,200,0.45)'; ctx.fillRect(bx,by,bw,bh);
  inkStroke(ctx,bx,by,bx+bw,by,8,0.32,35);
  inkStroke(ctx,bx,by+bh,bx+bw,by+bh,6,0.28,35);
  inkStroke(ctx,bx,by,bx,by+bh,6,0.28,18);
  inkStroke(ctx,bx+bw,by,bx+bw,by+bh,6,0.28,18);

  // 黑板（主视觉）
  const bbx=bx+bw*0.06,bby=by+bh*0.06,bbw=bw*0.88,bbh=bh*0.48;
  ctx.fillStyle='#2d4a3a'; ctx.fillRect(bbx,bby,bbw,bbh);
  // 木框
  ctx.fillStyle='rgba(120,85,35,0.6)';
  ctx.fillRect(bbx-4,bby-4,bbw+8,6); ctx.fillRect(bbx-4,bby+bbh-2,bbw+8,6);
  ctx.fillRect(bbx-4,bby-4,6,bbh+8); ctx.fillRect(bbx+bbw-2,bby-4,6,bbh+8);
  // 黑板内容——毕业快乐（粉笔质感）
  ctx.save();
  ctx.font=`bold ${bbw*0.14}px Noto Serif SC,serif`;
  ctx.textAlign='center';
  for(let pi=0;pi<4;pi++){
    ctx.fillStyle=`rgba(235,228,210,${0.18+pi*0.13})`;
    ctx.fillText('毕业快乐',bbx+bbw*0.5+(Math.random()-0.5)*1.2,bby+bbh*0.42+(Math.random()-0.5)*0.8);
  }
  // 装饰小图（粉笔）
  ctx.strokeStyle='rgba(235,228,210,0.35)'; ctx.lineWidth=1;
  // 左星
  for(let si=0;si<3;si++){
    const sx=bbx+bbw*(0.08+si*0.06),sy=bby+bbh*(0.18+si*0.12),sr=bbh*0.06;
    drawChalkStar(ctx,sx,sy,sr);
  }
  // 右花
  for(let fi=0;fi<2;fi++){
    const fx=bbx+bbw*(0.82+fi*0.07),fy=bby+bbh*(0.2+fi*0.18),fr=bbh*0.055;
    drawChalkFlower(ctx,fx,fy,fr);
  }
  // 粉笔灰
  ctx.fillStyle='rgba(235,228,210,0.08)'; ctx.fillRect(bbx+2,bby+bbh-12,bbw-4,10);
  // 粉笔槽
  ctx.fillStyle='rgba(120,85,35,0.5)'; ctx.fillRect(bbx,bby+bbh,bbw,5);
  ['rgba(235,228,210,0.75)','rgba(210,130,120,0.65)','rgba(130,180,130,0.65)','rgba(180,180,230,0.6)'].forEach((c,ci)=>{
    ctx.fillStyle=c; ctx.fillRect(bbx+bbw*0.18+ci*bbw*0.14,bby+bbh+1,bbw*0.1,4);
  });
  ctx.restore();

  // 课桌
  const rows=2,cols=3;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const dx=bx+bw*(0.1+c*0.28),dy=by+bh*(0.62+r*0.14);
      const dw2=bw*0.22,dh2=bh*0.1;
      ctx.save();
      ctx.fillStyle=`rgba(175,145,85,${0.28-r*0.05})`;
      ctx.beginPath();
      ctx.moveTo(dx,dy+dh2); ctx.lineTo(dx+dw2*0.12,dy); ctx.lineTo(dx+dw2,dy); ctx.lineTo(dx+dw2*0.88,dy+dh2); ctx.closePath();
      ctx.fill(); ctx.strokeStyle='rgba(120,90,40,0.22)'; ctx.lineWidth=0.8; ctx.stroke();
      ctx.restore();
    }
  }

  // 窗户（右侧，透午后阳光）
  [[bx+bw*0.7,by+bh*0.06],[bx+bw*0.82,by+bh*0.06]].forEach(([wx,wy])=>{
    const ww=bw*0.1,wh2=bh*0.38;
    const winG=ctx.createLinearGradient(wx,wy,wx+ww,wy+wh2);
    winG.addColorStop(0,'rgba(200,230,255,0.3)'); winG.addColorStop(1,'rgba(180,215,240,0.12)');
    ctx.fillStyle=winG; ctx.fillRect(wx,wy,ww,wh2);
    inkStroke(ctx,wx,wy,wx+ww,wy,2,0.3,6); inkStroke(ctx,wx,wy+wh2,wx+ww,wy+wh2,2,0.3,6);
    inkStroke(ctx,wx,wy,wx,wy+wh2,2,0.3,5); inkStroke(ctx,wx+ww,wy,wx+ww,wy+wh2,2,0.3,5);
    inkStroke(ctx,wx+ww*0.5,wy,wx+ww*0.5,wy+wh2,1,0.18,4);
    inkStroke(ctx,wx,wy+wh2*0.5,wx+ww,wy+wh2*0.5,1,0.18,4);
    // 光束
    ctx.save(); ctx.globalAlpha=0.08;
    ctx.fillStyle='rgba(255,240,180,1)';
    ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(wx+ww,wy); ctx.lineTo(bx,by+bh); ctx.lineTo(bx-W*0.05,by+bh); ctx.closePath(); ctx.fill();
    ctx.restore();
  });

  // 门（教室门，左侧）
  const ddx=bx+bw*0.02,ddy=by+bh*0.45,ddw=bw*0.08,ddh=bh*0.5;
  ctx.save();
  ctx.fillStyle='rgba(180,148,90,0.35)'; ctx.fillRect(ddx,ddy,ddw,ddh);
  inkStroke(ctx,ddx,ddy,ddx+ddw,ddy,3,0.38,8);
  inkStroke(ctx,ddx,ddy+ddh,ddx+ddw,ddy+ddh,3,0.35,8);
  inkStroke(ctx,ddx,ddy,ddx,ddy+ddh,3,0.38,7);
  inkStroke(ctx,ddx+ddw,ddy,ddx+ddw,ddy+ddh,3,0.38,7);
  inkStroke(ctx,ddx+ddw*0.5,ddy,ddx+ddw*0.5,ddy+ddh,1.5,0.2,5);
  // 门把
  ctx.beginPath(); ctx.arc(ddx+ddw*0.72,ddy+ddh*0.52,3,0,Math.PI*2);
  ctx.fillStyle='rgba(140,100,40,0.5)'; ctx.fill();
  ctx.restore();

  // 走廊地板
  ctx.save(); ctx.filter='blur(1px)';
  const floor=ctx.createLinearGradient(0,by+bh,0,H);
  floor.addColorStop(0,'rgba(195,175,135,0.22)'); floor.addColorStop(1,'rgba(175,155,115,0.08)');
  ctx.fillStyle=floor; ctx.fillRect(0,by+bh,W,H-by-bh);
  ctx.filter='none'; ctx.restore();

  // 水墨晕染角落
  ctx.save(); ctx.filter='blur(20px)';
  ctx.fillStyle='rgba(26,20,16,0.03)'; ctx.fillRect(0,0,W*0.15,H); ctx.fillRect(W*0.85,0,W*0.15,H);
  ctx.filter='none'; ctx.restore();

  // 落款
  ctx.save(); ctx.font=`${Math.min(W,H)*0.022}px Noto Serif SC,serif`; ctx.fillStyle='rgba(26,20,16,0.18)';
  ctx.textAlign='right'; ctx.fillText('友',W*0.96,H*0.96); ctx.restore();
}

function leaveShore(){
  document.getElementById('shore-story').classList.remove('visible');
  setTimeout(()=>{
    G.shorePaused=false;
    switchPhase('phase-shore','phase-game');
    // 重启游戏循环，速度稍快（告别后轻装前行）
    G.boatSpeed=1.3;
    G.gameRunning=true;
    lastT=0;
    G.raf=requestAnimationFrame(gameFrame);
    // 第一章结束，目前直接进入结尾（后续版本扩展章节）
    setTimeout(()=>{ endJourney(); },3500);
  },600);
}

// ═══════════════════════════════════════════
// 交互
// ═══════════════════════════════════════════
function setupInteraction(){
  let sx=0;
  const onStart=e=>{ sx=e.touches?e.touches[0].clientX:e.clientX; };
  const onEnd=e=>{
    const ex=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
    if(G.isStuck&&Math.abs(ex-sx)>18) unstuck();
    else if(!G.isStuck) createRipple(ex,e.changedTouches?e.changedTouches[0].clientY:e.clientY);
  };
  document.addEventListener('touchstart',onStart,{passive:true});
  document.addEventListener('touchend',onEnd,{passive:true});
  document.addEventListener('mousedown',onStart);
  document.addEventListener('mouseup',onEnd);
}
function createRipple(x,y){
  const r=document.createElement('div'); r.className='ripple-fx';
  const bw=document.getElementById('boat-wrap'),rect=bw.getBoundingClientRect();
  r.style.left=(x||rect.left+40)+'px'; r.style.top=(y||rect.top+28)+'px';
  document.body.appendChild(r); setTimeout(()=>r.remove(),950);
}

// ═══════════════════════════════════════════
// 结尾
// ═══════════════════════════════════════════
function endJourney(){
  G.gameRunning=false;
  if(G.raf) cancelAnimationFrame(G.raf);
  setTimeout(()=>{
    const cur=document.getElementById('phase-game').classList.contains('hidden')?'phase-shore':'phase-game';
    switchPhase(cur,'phase-end');
    document.getElementById('end-quote').textContent='「 '+(G.boatText||'愿它把你带到想去的地方')+' 」';
    setTimeout(()=>document.getElementById('end-ink').style.opacity='1',300);
    setTimeout(()=>{
      document.getElementById('end-quote').classList.add('reveal');
      document.getElementById('end-sub').classList.add('reveal');
      document.getElementById('end-seal').classList.add('reveal');
    },900);
    setTimeout(()=>document.getElementById('btn-restart').classList.add('reveal'),4600);
  },700);
}

// ═══════════════════════════════════════════
// 通用Phase切换
// ═══════════════════════════════════════════
function switchPhase(fromId,toId){
  const f=document.getElementById(fromId),t=document.getElementById(toId);
  f.style.opacity='0';
  setTimeout(()=>{
    f.classList.add('hidden');
    t.classList.remove('hidden');
    t.style.opacity='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      t.style.transition='opacity 0.65s ease'; t.style.opacity='1';
    }));
  },420);
}
</script>
