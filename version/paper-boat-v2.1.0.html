<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>纸船漂流 v2.0.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --ink:#1a1410; --ink2:#3d3028; --paper:#f4ede0;
  --ochre:#c8703a; --ochreL:#e8915a; --ochreD:#a05828;
}
html,body{width:100%;height:100%;background:var(--paper);font-family:'Noto Serif SC',serif;overflow:hidden;touch-action:none;}

/* ── WebGL底层 ── */
#webgl-canvas{position:fixed;inset:0;width:100%!important;height:100%!important;z-index:1;}

/* ── 所有Canvas层（z-index 2-9）由JS动态创建 ── */

/* ── UI层 ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;transition:opacity 0.7s ease;pointer-events:all;}
.screen.off{opacity:0;pointer-events:none;}

/* ── 标题 ── */
#s-title{background:var(--paper);}
.title-main{font-size:clamp(2.8rem,9vw,5.5rem);font-weight:300;color:var(--ink);letter-spacing:0.38em;position:relative;margin-bottom:0.2em;}
.title-main::after{content:'';position:absolute;bottom:-10px;left:6%;right:6%;height:1px;background:linear-gradient(to right,transparent,var(--ochre),transparent);opacity:0.55;}
.title-sub{font-size:0.74rem;color:rgba(26,20,16,0.32);letter-spacing:0.5em;margin-top:0.5em;}
.seal{font-size:0.52rem;color:var(--ochre);border:1.5px solid var(--ochre);padding:0.2em 0.55em;letter-spacing:0.2em;opacity:0.72;margin:0.6em 0;}
.btn{background:none;border:1px solid rgba(26,20,16,0.18);color:var(--ink2);font-family:inherit;font-size:0.78rem;letter-spacing:0.3em;padding:0.65em 2.2em;cursor:pointer;transition:all 0.22s;margin-top:0.8em;}
.btn:hover{background:rgba(200,112,58,0.06);border-color:var(--ochre);}

/* ── 选择 ── */
#s-choose{background:var(--paper);gap:2em;}
.choose-hint{font-size:0.7rem;color:rgba(26,20,16,0.3);letter-spacing:0.35em;}
.cards{display:flex;gap:1.8em;}
.card{width:min(155px,40vw);aspect-ratio:3/4;position:relative;cursor:pointer;overflow:hidden;border:1px solid rgba(26,20,16,0.07);transition:transform 0.3s,box-shadow 0.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 14px 36px rgba(200,112,58,0.13);}
.card.sel{box-shadow:0 0 0 2px var(--ochre),0 14px 36px rgba(200,112,58,0.18);}
.card canvas{position:absolute;inset:0;width:100%;height:100%;}

/* ── 写字 ── */
#s-write{background:var(--paper);gap:1.5em;}
.write-hint{font-size:0.74rem;color:rgba(26,20,16,0.32);letter-spacing:0.28em;}
#paper-wrap{width:min(305px,86vw);background:rgba(255,252,245,0.97);border:1px solid rgba(26,20,16,0.07);box-shadow:2px 6px 20px rgba(26,20,16,0.07);padding:2.2em 2em;display:flex;flex-direction:column;gap:0.9em;align-items:center;}
.paper-label{font-size:0.6rem;color:rgba(26,20,16,0.22);letter-spacing:0.25em;align-self:flex-start;}
#boat-text{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(26,20,16,0.1);font-family:'Noto Serif SC',serif;font-size:0.94rem;font-weight:300;color:var(--ink);letter-spacing:0.1em;padding:0.28em 0;text-align:center;outline:none;resize:none;line-height:1.9;}
#boat-text::placeholder{color:rgba(26,20,16,0.14);font-size:0.8rem;}
.char-c{font-size:0.55rem;color:rgba(26,20,16,0.15);align-self:flex-end;}

/* ── 折纸 ── */
#s-fold{background:var(--paper);}
#fold-stage{width:200px;height:200px;display:flex;align-items:center;justify-content:center;}
.fold-msg{font-size:0.7rem;color:rgba(26,20,16,0.28);letter-spacing:0.25em;margin-top:1.2em;text-align:center;min-height:1.4em;}

/* ── 游戏HUD（透明浮层）── */
#s-game{background:transparent;pointer-events:none;z-index:15;}
#progress{position:fixed;top:0;left:0;right:0;height:2px;background:rgba(26,20,16,0.04);z-index:16;pointer-events:none;}
#progress-fill{height:100%;background:linear-gradient(to right,rgba(200,112,58,0.18),rgba(200,112,58,0.52));width:0%;transition:width 0.4s;}
#loc-label{position:fixed;top:1.4em;left:50%;transform:translateX(-50%);font-size:0.62rem;color:var(--ochre);letter-spacing:0.32em;z-index:16;opacity:0;transition:opacity 0.5s;pointer-events:none;}
#loc-label.on{opacity:0.82;}
#hint{position:fixed;bottom:9em;left:50%;transform:translateX(-50%);font-size:0.64rem;color:rgba(26,20,16,0.24);letter-spacing:0.2em;z-index:16;opacity:0;transition:opacity 0.4s;pointer-events:none;text-align:center;max-width:80vw;}
#hint.on{opacity:1;}
#worry{position:fixed;z-index:16;pointer-events:none;font-family:'Noto Serif SC',serif;font-size:clamp(0.7rem,2vw,0.92rem);font-weight:300;color:rgba(200,112,58,0);letter-spacing:0.28em;transition:color 1.8s,text-shadow 1.8s;white-space:nowrap;}
#worry.on{color:rgba(200,112,58,0.3);text-shadow:0 2px 16px rgba(200,112,58,0.18);}

/* ── 故事卡片 ── */
#story-card{position:fixed;bottom:2em;left:50%;transform:translateX(-50%) translateY(14px);width:min(362px,90vw);background:rgba(244,237,224,0.97);border:1px solid rgba(200,112,58,0.13);padding:1.65em 1.85em;opacity:0;pointer-events:none;transition:opacity 0.5s,transform 0.5s;box-shadow:0 6px 28px rgba(26,20,16,0.09);z-index:17;}
#story-card::before{content:'';position:absolute;top:0;left:1.8em;right:1.8em;height:1px;background:linear-gradient(to right,transparent,rgba(200,112,58,0.22),transparent);}
#story-card.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
.s-loc{font-size:0.62rem;color:var(--ochre);letter-spacing:0.32em;margin-bottom:0.72em;display:flex;align-items:center;gap:0.5em;}
.s-loc::before{content:'';width:15px;height:1px;background:var(--ochre);opacity:0.5;}
.s-txt{font-size:0.84rem;line-height:2.12;color:var(--ink2);font-weight:300;}
.s-next{margin-top:1.1em;font-size:0.63rem;color:rgba(26,20,16,0.22);text-align:right;letter-spacing:0.15em;cursor:pointer;transition:color 0.2s;pointer-events:all;}
.s-next:hover{color:var(--ochre);}

/* ── 水波ripple ── */
.ripple{position:fixed;border-radius:50%;border:1px solid rgba(200,112,58,0.28);width:6px;height:6px;pointer-events:none;animation:rpl 1s ease-out forwards;z-index:18;}
@keyframes rpl{to{width:58px;height:58px;margin-left:-26px;margin-top:-26px;opacity:0;}}

/* ── 登岸画面 ── */
#s-shore{z-index:40;background:var(--paper);}
#shore-bg{position:absolute;inset:0;width:100%;height:100%;}
#shore-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.5s;z-index:2;}
#shore-img.on{opacity:1;}
#shore-fx{position:absolute;inset:0;z-index:5;}
#shore-card{position:fixed;bottom:2em;left:50%;transform:translateX(-50%) translateY(14px);width:min(362px,90vw);background:rgba(244,237,224,0.97);border:1px solid rgba(200,112,58,0.13);padding:1.65em 1.85em;opacity:0;pointer-events:none;transition:opacity 0.5s,transform 0.5s;box-shadow:0 6px 28px rgba(26,20,16,0.09);z-index:55;}
#shore-card::before{content:'';position:absolute;top:0;left:1.8em;right:1.8em;height:1px;background:linear-gradient(to right,transparent,rgba(200,112,58,0.22),transparent);}
#shore-card.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
#shore-hint{position:fixed;bottom:3em;left:50%;transform:translateX(-50%);font-size:0.68rem;color:rgba(26,20,16,0.3);letter-spacing:0.22em;z-index:56;pointer-events:none;transition:opacity 0.4s;text-align:center;}

/* ── 章节过场 ── */
#chapter-curtain{position:fixed;inset:0;background:rgba(244,237,224,0);z-index:70;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background 0.7s;}
#chapter-curtain.on{background:rgba(244,237,224,0.94);}
.cc-num{font-size:0.56rem;color:rgba(200,112,58,0);letter-spacing:0.42em;transition:color 0.5s 0.3s;}
.cc-name{font-size:clamp(1.4rem,5vw,2.5rem);font-weight:300;color:rgba(26,20,16,0);letter-spacing:0.42em;margin-top:0.4em;transition:color 0.5s 0.5s;}
.cc-sub{font-size:0.66rem;color:rgba(26,20,16,0);letter-spacing:0.28em;margin-top:0.7em;transition:color 0.5s 0.7s;}
#chapter-curtain.on .cc-num{color:rgba(200,112,58,0.7);}
#chapter-curtain.on .cc-name{color:rgba(26,20,16,0.85);}
#chapter-curtain.on .cc-sub{color:rgba(26,20,16,0.34);}

/* ── 选择按钮 ── */
.choice-panel{position:fixed;bottom:7em;left:50%;transform:translateX(-50%);display:flex;gap:1.2em;z-index:60;}
.choice-btn{background:rgba(244,237,224,0.96);border:1px solid rgba(200,112,58,0.35);font-family:inherit;font-size:0.7rem;color:var(--ink2);letter-spacing:0.2em;padding:0.6em 1.4em;cursor:pointer;transition:all 0.22s;}
.choice-btn:hover{background:rgba(200,112,58,0.08);}
.choice-btn.alt{border-color:rgba(26,20,16,0.13);}

/* ── 结尾 ── */
#s-end{z-index:60;}
#end-ink{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(26,20,16,0) 0%,rgba(26,20,16,0.92) 100%);opacity:0;transition:opacity 2.2s;}
#end-wrap{position:relative;z-index:2;text-align:center;padding:2em;}
#end-quote{font-size:clamp(1rem,3.5vw,1.5rem);font-weight:300;color:rgba(244,237,224,0);letter-spacing:0.34em;line-height:2.3;transition:color 2.5s ease 1.2s;max-width:480px;}
#end-quote.on{color:rgba(244,237,224,0.88);}
#end-sub{font-size:0.63rem;color:rgba(244,237,224,0);letter-spacing:0.42em;margin-top:1.4em;transition:color 2s ease 2.8s;}
#end-sub.on{color:rgba(244,237,224,0.33);}
#end-seal{display:inline-block;font-size:0.5rem;color:rgba(200,112,58,0);border:1px solid rgba(200,112,58,0);padding:0.2em 0.5em;margin-top:1.4em;letter-spacing:0.18em;transition:color 1.5s ease 3.8s,border-color 1.5s ease 3.8s;}
#end-seal.on{color:rgba(200,112,58,0.62);border-color:rgba(200,112,58,0.42);}
.btn-restart{background:none;border:1px solid rgba(244,237,224,0.14);color:rgba(244,237,224,0);font-family:inherit;font-size:0.67rem;letter-spacing:0.28em;padding:0.58em 1.6em;cursor:pointer;margin-top:2em;transition:color 1.2s ease 4.5s,border-color 1.2s ease 4.5s,background 0.22s;}
.btn-restart.on{color:rgba(244,237,224,0.34);border-color:rgba(244,237,224,0.16);}
.btn-restart:hover{background:rgba(244,237,224,0.05);}
</style>
</head>
<body>

<canvas id="webgl-canvas"></canvas>

<!-- 标题 -->
<div class="screen" id="s-title">
  <h1 class="title-main">纸船漂流</h1>
  <p class="title-sub">随水而去　随缘而遇</p>
  <div class="seal">童年 · 渠 · 治愈</div>
  <button class="btn" onclick="Audio.start(); SM.go('choose')">开始</button>
</div>

<!-- 选择 -->
<div class="screen off" id="s-choose">
  <p class="choose-hint">选一个你现在最想见的</p>
  <div class="cards">
    <div class="card" id="card-family" onclick="SM.selectPath('family')">
      <canvas id="cv-family"></canvas>
    </div>
    <div class="card" id="card-friend" onclick="SM.selectPath('friend')">
      <canvas id="cv-friend"></canvas>
    </div>
  </div>
  <button class="btn" id="btn-path" onclick="SM.go('write')" style="opacity:0;pointer-events:none;transition:opacity 0.4s;">继续</button>
</div>

<!-- 写字 -->
<div class="screen off" id="s-write">
  <p class="write-hint" id="write-hint">写一句话给这只船</p>
  <div id="paper-wrap">
    <span class="paper-label">——写给这只纸船——</span>
    <textarea id="boat-text" placeholder="想说的话…" maxlength="20" rows="2"></textarea>
    <span class="char-c" id="char-c">0 / 20</span>
  </div>
  <button class="btn" style="margin-top:1.3em" onclick="SM.go('fold')">折船出发</button>
</div>

<!-- 折纸 -->
<div class="screen off" id="s-fold">
  <div id="fold-stage">
    <svg id="fold-svg" width="180" height="180" viewBox="0 0 180 180"></svg>
  </div>
  <p class="fold-msg" id="fold-msg">准备折叠…</p>
</div>

<!-- 游戏HUD -->
<div class="screen off" id="s-game">
  <div id="progress"><div id="progress-fill"></div></div>
  <button id="mute-btn" onclick="this.textContent=Audio.toggleMute()?'♪':'♫'"
    style="position:fixed;top:0.8em;right:1em;background:none;border:none;
    font-size:1rem;color:rgba(26,20,16,0.3);cursor:pointer;z-index:30;
    pointer-events:all;transition:color 0.2s;"
    title="静音/开音">♫</button>
  <div id="loc-label"></div>
  <div id="hint"></div>
  <div id="worry"></div>
  <div id="story-card">
    <div class="s-loc" id="s-loc"></div>
    <p class="s-txt" id="s-txt"></p>
    <div class="s-next" onclick="SM.dismissStory()">继续漂流 →</div>
  </div>
</div>

<!-- 登岸 -->
<div class="screen off" id="s-shore">
  <canvas id="shore-bg"></canvas>
  <img id="shore-img" src="" alt="" onerror="this.style.display='none'" onload="this.classList.add('on')"/>
  <canvas id="shore-fx"></canvas>
  <div id="shore-card">
    <div class="s-loc" id="shore-loc"></div>
    <p class="s-txt" id="shore-txt"></p>
    <div class="s-next" id="shore-next">告别，继续前行 →</div>
  </div>
  <div id="shore-hint"></div>
</div>

<!-- 章节过场 -->
<div id="chapter-curtain">
  <div class="cc-num" id="cc-num"></div>
  <div class="cc-name" id="cc-name"></div>
  <div class="cc-sub" id="cc-sub"></div>
</div>

<!-- 结尾 -->
<div class="screen off" id="s-end">
  <div id="end-ink"></div>
  <div id="end-wrap">
    <div id="end-quote"></div>
    <div id="end-sub">纸船已漂向远处</div>
    <div id="end-seal">童年 · 渠 · 治愈</div><br>
    <button class="btn-restart" id="btn-restart" onclick="location.reload()">再折一只</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 有限状态机（FSM）——整个游戏只有一个主循环，一个状态
// ═══════════════════════════════════════════════════════════════
const SCREENS = ['s-title','s-choose','s-write','s-fold','s-game','s-shore','s-end'];

const SM = {
  // ── 状态 ──
  state: 'title',   // title|choose|write|fold|drift|shore|end
  path: '',         // family|friend
  boatText: '',
  chIdx: 0,         // 当前章节索引 0-5
  ch3Choice: null,  // speak|silent

  // ── 漂流物理 ──
  worldX: 0,
  phys: { vx:1, vy:0, rot:0, rotV:0, screenY:0,
          whirl:false, whirlAngle:0, whirlR:0, whirlCX:0,
          darkCurrent:false, darkDir:0, stuckType:'' },
  stuck: false,
  stuckTimer: null,
  waveT: 0,
  shownScenes: new Set(),

  // ── 登岸 ──
  shore: { personX:0, personY:0, state:'idle', target:0,
           soupDone:false, chalkLines:[], drawing:false,
           friendAppeared:false, petT:0, walkT:0 },

  // ── 动画 ──
  raf: null,
  lastT: 0,
  particles: [],
  worryDrift: { x:0, vx:0, rot:0 },
  worryVisible: false,
  worryTimer: null,

  // ─────────────────────────────────────────
  // 状态切换（唯一入口）
  // ─────────────────────────────────────────
  go(next, opts={}){
    if(this.raf){ cancelAnimationFrame(this.raf); this.raf=null; }
    const prev=this.state;
    this.state=next;

    // 屏幕切换
    const screenMap={
      title:'s-title', choose:'s-choose', write:'s-write',
      fold:'s-fold', drift:'s-game', shore:'s-shore', end:'s-end'
    };
    SCREENS.forEach(id=>{
      const el=document.getElementById(id);
      if(!el) return;
      el.classList.toggle('off', id!==screenMap[next]);
    });

    // 进入各状态的初始化
    switch(next){
      case 'choose':   this._initChoose(); break;
      case 'write':    this._initWrite(); break;
      case 'fold':     this._initFold(); break;
      case 'drift':    this._initDrift(opts); break;
      case 'shore':    this._initShore(opts); break;
      case 'end':      this._initEnd(); break;
    }
  },

  // ─────────────────────────────────────────
  // CHOOSE
  // ─────────────────────────────────────────
  selectPath(p){
    this.path=p;
    document.getElementById('card-family').classList.toggle('sel',p==='family');
    document.getElementById('card-friend').classList.toggle('sel',p==='friend');
    const btn=document.getElementById('btn-path');
    btn.style.opacity='1'; btn.style.pointerEvents='all';
  },
  _initChoose(){
    setTimeout(()=>{ drawFamilyCard(); drawFriendCard(); },200);
  },

  // ─────────────────────────────────────────
  // WRITE
  // ─────────────────────────────────────────
  _initWrite(){
    document.getElementById('write-hint').textContent=
      this.path==='family'?'写一句想对家人说的话':'写一句想对朋友说的话';
  },

  // ─────────────────────────────────────────
  // FOLD
  // ─────────────────────────────────────────
  _initFold(){
    this.boatText=document.getElementById('boat-text').value.trim();
    runFoldAnim(()=>{
      // 折完后：显示第一章过场，再进入漂流
      showChapterCurtain(0, ()=>{ SM.go('drift',{chIdx:0}); });
    });
  },

  // ─────────────────────────────────────────
  // DRIFT（漂流）
  // ─────────────────────────────────────────
  _initDrift({chIdx=0}={}){
    this.chIdx=chIdx;
    const ch=CHAPTERS[chIdx];

    // 重置漂流状态
    this.worldX=ch.startX;
    this.phys.vx=1.0; this.phys.vy=0; this.phys.rot=0;
    this.phys.rotV=0; this.phys.screenY=0;
    this.phys.whirl=false; this.phys.darkCurrent=false;
    this.stuck=false;
    clearTimeout(this.stuckTimer);
    this.shownScenes=new Set();
    // 重置该章障碍
    ch.obstacles.forEach(ob=>{ ob.passed=false; });

    // WebGL/Canvas层
    if(!GL.ready) GL.init();
    GL.resize();
    Layers.build();
    Layers.show();

    // 烦恼文字
    const wt=document.getElementById('worry');
    wt.textContent=this.boatText||'';
    wt.style.left='50%'; wt.style.top=(RM()+22)+'px';
    wt.style.transform='translateX(-50%)';
    wt.classList.remove('on');
    this.worryDrift={x:0,vx:0,rot:0};
    this.worryVisible=false;

    // 进度条颜色随章节
    document.getElementById('progress-fill').style.width='0%';

    // 第六章：船速逐渐减慢
    if(chIdx===5){
      this.phys.vx=0.85;
      this._ch6SlowDown();
    }

    this.lastT=0;
    this.raf=requestAnimationFrame(t=>this._driftLoop(t));
  },

  _ch6SlowDown(){
    const iv=setInterval(()=>{
      if(this.state!=='drift'||this.chIdx!==5){ clearInterval(iv); return; }
      this.phys.vx=Math.max(0.18, this.phys.vx-0.04);
      if(this.phys.vx<=0.18) clearInterval(iv);
    },900);
  },

  _driftLoop(t){
    if(this.state!=='drift'){ this.raf=null; return; }
    const dt=Math.min(t-this.lastT,50); this.lastT=t;
    this.waveT+=dt*0.001;

    this._updatePhysics(dt);
    this._checkObstacles();
    this._checkScenes();
    this._updateWorry();

    const ch=CHAPTERS[this.chIdx];
    const prog=this.worldX/WORLD_W;
    document.getElementById('progress-fill').style.width=(prog*100)+'%';

    // 到达章节终点（或 directShore 章节：startX===endX 立即登岸）
    if(this.worldX>=ch.endX && !this.phys.whirl && !this.stuck){
      if(ch.shoreType){
        this.go('shore',{chIdx:this.chIdx});
      } else {
        this._nextChapter();
      }
      return;
    }

    // 渲染
    GL.render(this.worldX/WORLD_W, this.waveT);
    Layers.render(this.worldX, this.waveT);
    Layers.renderObstacles(this.worldX, this.waveT, ch.obstacles);
    Layers.renderBoat(this.worldX, this.waveT, this.phys, this.boatText);
    Layers.renderParticles(dt, this.waveT, this.particles);
    Layers.renderEffects(this.waveT, this.phys);
    this._spawnParticles();

    this.raf=requestAnimationFrame(t=>this._driftLoop(t));
  },

  // ─────────────────────────────────────────
  // 物理
  // ─────────────────────────────────────────
  _updatePhysics(dt){
    const p=this.phys, dts=dt/16;
    if(p.whirl){
      p.whirlAngle+=0.045*dts;
      p.whirlR=Math.max(p.whirlR-0.18*dts,4);
      this.worldX=p.whirlCX+Math.cos(p.whirlAngle)*p.whirlR*2;
      p.screenY=Math.sin(p.whirlAngle)*p.whirlR*0.6;
      p.rot=p.whirlAngle+Math.PI*0.5;
      if(p.whirlR<=5) this._unstuck();
      return;
    }
    if(p.darkCurrent){
      p.vy+=p.darkDir*0.12*dts;
      p.vx+=(0.5-p.vx)*0.04*dts;
      p.rotV+=p.darkDir*0.01*dts;
    }
    if(this.stuck){
      if(p.stuckType==='rock'){ p.rotV+=(Math.random()-0.5)*0.008*dts; p.rot+=p.rotV; p.rot*=0.92; p.rotV*=0.88; }
      else if(p.stuckType==='weed'){ p.vy+=(Math.random()-0.5)*0.04*dts; p.screenY+=p.vy; p.screenY*=0.94; p.vy*=0.9; p.rot=Math.sin(this.waveT*2.5)*0.08; }
      return;
    }
    const wf=p.vx*0.12;
    const turb=(Math.sin(this.worldX*0.018+this.waveT*1.3)*0.04+Math.sin(this.worldX*0.007+this.waveT*0.7)*0.025)*dts;
    p.vx+=(wf-p.vx*0.08)*dts; p.vx=Math.min(p.vx,CHAPTERS[this.chIdx].speed*2.5);
    this.worldX+=p.vx*dts;
    p.vy+=turb; p.vy*=0.96; p.screenY+=p.vy*dts;
    const maxY=(RB()-RT())*0.28;
    if(Math.abs(p.screenY)>maxY){ p.screenY=Math.sign(p.screenY)*maxY; p.vy*=-0.4; }
    const tRot=p.vy*0.12+turb*1.8;
    p.rotV+=(tRot-p.rot)*0.08*dts; p.rotV*=0.85; p.rot+=p.rotV*dts;
    p.rot=Math.max(-0.28,Math.min(0.28,p.rot));
  },

  // ─────────────────────────────────────────
  // 障碍物
  // ─────────────────────────────────────────
  _checkObstacles(){
    if(this.phys.whirl) return;
    const obs=CHAPTERS[this.chIdx].obstacles;
    for(const ob of obs){
      if(ob.passed) continue;
      if(this.worldX>ob.x-10 && this.worldX<ob.x+55){
        ob.passed=true;
        this.phys.stuckType=ob.type;
        if(ob.type==='whirlpool'){
          this.stuck=false;
          this.phys.whirl=true; this.phys.whirlCX=ob.x;
          this.phys.whirlAngle=0; this.phys.whirlR=38; this.phys.vx=0;
        } else if(ob.type==='darkcurrent'){
          this.phys.darkCurrent=true;
          this.phys.darkDir=(Math.random()>0.5?1:-1);
          this.phys.vx=-1.8; this.phys.vy=this.phys.darkDir*3.5;
          this.phys.rotV=this.phys.darkDir*0.22;
          clearTimeout(this.stuckTimer);
          this.stuckTimer=setTimeout(()=>{
            this.phys.darkCurrent=false; this.phys.vx=CHAPTERS[this.chIdx].speed;
            this.phys.vy*=0.2; setHint('');
          },4200);
        } else {
          this.stuck=true; this.phys.vx=0;
          if(ob.type==='rock'){ this.phys.rotV=(Math.random()>0.5?1:-1)*0.18; Audio.playStuck('rock'); }
          clearTimeout(this.stuckTimer);
          this.stuckTimer=setTimeout(()=>{ if(this.stuck) this._unstuck(); },5000);
        }
        setHint(ob.label||'');
        this._showWorry();
        break;
      }
    }
  },

  _unstuck(){
    this.stuck=false; this.phys.whirl=false; this.phys.darkCurrent=false;
    clearTimeout(this.stuckTimer);
    this.phys.vx=CHAPTERS[this.chIdx].speed*2.8;
    this.phys.rotV=(Math.random()-0.5)*0.12;
    setHint('');
    createRipple();
    Audio.playUnstuck();
    this._showWorry(3200);
  },

  // ─────────────────────────────────────────
  // 场景故事
  // ─────────────────────────────────────────
  _checkScenes(){
    if(this.stuck||this.phys.whirl) return;
    const scenes=CHAPTERS[this.chIdx].scenes||[];
    scenes.forEach((sc,i)=>{
      const k=`${this.chIdx}_${i}`;
      if(this.shownScenes.has(k)) return;
      if(this.worldX>sc.x && this.worldX<sc.x+55){
        this.shownScenes.add(k);
        this._pauseForStory(sc);
      }
    });
  },

  _storyPaused: false,
  _pauseForStory(sc){
    this._storyPaused=true;
    document.getElementById('s-loc').textContent=sc.location;
    document.getElementById('s-txt').textContent=
      (sc[this.path]||sc.text||'');  // 支持家人/朋友差异文字
    document.getElementById('story-card').classList.add('on');
    showLocLabel(sc.location);
    Audio.playStoryAppear();
  },
  dismissStory(){
    document.getElementById('story-card').classList.remove('on');
    setTimeout(()=>{ this._storyPaused=false; },300);
  },

  // ─────────────────────────────────────────
  // 烦恼文字
  // ─────────────────────────────────────────
  _showWorry(duration=3500){
    if(!this.boatText) return;
    const wt=document.getElementById('worry');
    this.worryVisible=true; wt.classList.add('on');
    this.worryDrift.vx=(Math.random()-0.5)*0.5;
    this.worryDrift.rot=(Math.random()-0.5)*0.06;
    clearTimeout(this.worryTimer);
    this.worryTimer=setTimeout(()=>{ wt.classList.remove('on'); this.worryVisible=false; },duration);
  },
  _updateWorry(){
    if(!this.worryVisible) return;
    const d=this.worryDrift;
    d.vx*=0.96; d.x+=d.vx; d.rot*=0.94;
    const woff=Math.sin(this.waveT*1.8+this.worldX*0.01)*3;
    document.getElementById('worry').style.transform=
      `translateX(calc(-50% + ${d.x}px)) translateY(${woff}px) rotate(${d.rot}rad)`;
  },

  // 第二章：烦恼文字更频繁
  _worryIntenseTimer: 0,
  _updateWorryIntense(){
    if(this.worryVisible||!this.boatText) return;
    this._worryIntenseTimer++;
    if(this._worryIntenseTimer>200){
      this._worryIntenseTimer=0;
      this._showWorry(2800);
    }
  },

  // ─────────────────────────────────────────
  // 章节推进
  // ─────────────────────────────────────────
  _nextChapter(){
    const next=this.chIdx+1;
    if(next>=CHAPTERS.length){ this.go('end'); return; }
    showChapterCurtain(next,()=>{ SM.go('drift',{chIdx:next}); });
  },

  // ─────────────────────────────────────────
  // SHORE（登岸）
  // ─────────────────────────────────────────
  _initShore({chIdx}={}){
    this.chIdx=chIdx;
    const ch=CHAPTERS[chIdx];
    Layers.hide();
    Audio.playShoreArrive();

    const bg=document.getElementById('shore-bg');
    bg.width=VW; bg.height=VH;
    const ctx=bg.getContext('2d');

    const fx=document.getElementById('shore-fx');
    fx.width=VW; fx.height=VH;

    document.getElementById('shore-img').src=''; // 清除旧图片

    // 根据章节类型绘制
    switch(ch.shoreType){
      case 'home':
        document.getElementById('shore-img').src=
          this.path==='family'?'shore-family.png':'shore-friend.png';
        drawHomeShore(ctx,VW,VH,this.path);
        this._startHomeInteraction();
        break;
      case 'mountain':
        drawMountainShore(ctx,VW,VH);
        this._startMountainInteraction();
        break;
      case 'summit':
        drawSummitShore(ctx,VW,VH);
        this._startSummitInteraction();
        break;
      case 'home_end':
        drawHomeEndShore(ctx,VW,VH,this.path);
        this._startHomeEndInteraction();
        break;
    }
  },

  _leaveShore(){
    Audio.playShoreLeave();
    // 停所有登岸动画
    if(this._shoreRaf){ cancelAnimationFrame(this._shoreRaf); this._shoreRaf=null; }
    document.getElementById('shore-card').classList.remove('on');
    document.getElementById('shore-hint').textContent='';
    // 清除选择面板
    const cp=document.getElementById('choice-panel');
    if(cp) cp.remove();
    // 恢复地图层
    Layers.show();

    const next=this.chIdx+1;
    if(next>=CHAPTERS.length){ this.go('end'); return; }
    showChapterCurtain(next,()=>{ SM.go('drift',{chIdx:next}); });
  },

  // ── 家人/朋友登岸 ──
  _shoreRaf: null,
  _startHomeInteraction(){
    const sh=this.shore;
    sh.personX=VW*0.14; sh.personY=VH*0.82; sh.state='idle';
    sh.soupDone=false; sh.chalkLines=[]; sh.drawing=false;
    sh.friendAppeared=false; sh.walkT=0;
    showShoreHint('轻触屏幕，走向那扇门');

    const fx=document.getElementById('shore-fx');
    if(this.path==='family'){
      fx.onclick=()=>this._onFamilyTap();
      fx.ontouchend=()=>this._onFamilyTap();
    } else {
      this._setupChalkInteraction(fx);
    }
    this._shoreRaf=requestAnimationFrame(t=>this._homeShoreLoop(t));
  },

  _onFamilyTap(){
    const sh=this.shore;
    if(sh.state==='sitting'&&sh.soupDone){
      // 只有第三章（chIdx===2）才显示"说/不说"选择
      if(this.chIdx===2 && !this.ch3Choice){
        this._showCh3Choice(); return;
      }
      sh.state='leaving';
      hideShoreHint();
      setTimeout(()=>{ this._leaveShore(); },2000);
    } else if(sh.state==='idle'||sh.state==='walking'){
      sh.target=VW*0.5; sh.state='walking'; hideShoreHint();
    } else if(sh.state==='arrived'){
      sh.state='entering'; hideShoreHint();
    }
  },

  _homeShoreLoop(t){
    if(this.state!=='shore'){ this._shoreRaf=null; return; }
    const ctx=document.getElementById('shore-fx').getContext('2d');
    const sh=this.shore;
    ctx.clearRect(0,0,VW,VH);
    sh.walkT+=0.1;

    // 人物移动
    if(sh.state==='walking'){
      const dx=sh.target-sh.personX; sh.personX+=dx*0.045;
      if(Math.abs(dx)<3){ sh.state='arrived'; showShoreHint('轻触—敲敲那扇门'); }
    } else if(sh.state==='entering'){
      sh.personX+=2.2; sh.personY-=0.5;
      if(sh.personX>VW*0.52){
        sh.state='sitting'; sh.personX=VW*0.48; sh.personY=VH*0.74;
        setTimeout(()=>{ sh.soupDone=true; showShoreHint('喝一口热汤。再次轻触，起身告别'); },2000);
      }
    } else if(sh.state==='leaving'){
      sh.personX-=1.8; sh.personY+=0.4;
    }

    // 门口暖光
    if(sh.state!=='idle'&&sh.state!=='walking'){
      const g=ctx.createRadialGradient(VW*0.5,VH*0.56,0,VW*0.5,VH*0.56,VW*0.14);
      g.addColorStop(0,'rgba(200,112,58,0.26)'); g.addColorStop(1,'rgba(200,112,58,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(VW*0.5,VH*0.56,VW*0.14,0,Math.PI*2); ctx.fill();
    }

    // 汤碗
    if(sh.state==='sitting'||sh.state==='leaving') drawSoupBowl(ctx,sh.personX+VW*0.04,sh.personY,sh.soupDone,this.waveT);

    // 朋友线：粉笔
    if(this.path==='friend'){
      sh.chalkLines.forEach(l=>drawChalkLine(ctx,l));
      if(sh._curLine&&sh._curLine.pts.length>1) drawChalkLine(ctx,sh._curLine);
      if(sh.friendAppeared) drawPerson(ctx,sh.personX,sh.personY,'idle',sh.walkT);
    } else {
      drawPerson(ctx,sh.personX,sh.personY,sh.state,sh.walkT);
    }

    this._shoreRaf=requestAnimationFrame(t=>this._homeShoreLoop(t));
  },

  _setupChalkInteraction(fx){
    const sh=this.shore;
    sh.chalkLines=[]; sh._curLine=null; sh._chalkIdx=0;
    showShoreHint('在黑板上留下什么——用手指划');
    const COLORS=['rgba(238,232,215,0.85)','rgba(200,112,58,0.8)','rgba(130,185,130,0.78)','rgba(175,175,228,0.78)'];
    const getBB=()=>({x:VW*0.04,y:VH*0.04,w:VW*0.92,h:VH*0.50});
    const inBB=(x,y)=>{ const b=getBB(); return x>b.x&&x<b.x+b.w&&y>b.y&&y<b.y+b.h; };
    const ptr=e=>e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};

    fx.addEventListener('mousedown',e=>{
      const p=ptr(e); if(!inBB(p.x,p.y))return;
      sh.drawing=true; sh._curLine={color:COLORS[sh._chalkIdx%4],pts:[p]};
    });
    fx.addEventListener('mousemove',e=>{
      if(!sh.drawing||!sh._curLine)return;
      const p=ptr(e); if(!inBB(p.x,p.y)){sh.drawing=false;return;}
      sh._curLine.pts.push(p);
    });
    const endDraw=()=>{
      if(!sh.drawing)return; sh.drawing=false;
      if(sh._curLine&&sh._curLine.pts.length>1){
        sh.chalkLines.push(sh._curLine); sh._chalkIdx++; sh._curLine=null;
        if(sh.chalkLines.length>=3&&!sh.friendAppeared){
          sh.friendAppeared=true; hideShoreHint();
          setTimeout(()=>{
            sh.personX=VW*0.78; sh.personY=VH*0.72; sh.state='idle';
            // 朋友也画一笔
            const b=getBB();
            const fl={color:'rgba(200,112,58,0.68)',pts:[]};
            for(let a=0;a<=Math.PI*2;a+=0.28) fl.pts.push({x:b.x+b.w*0.62+Math.cos(a)*b.w*0.04,y:b.y+b.h*0.55+Math.sin(a)*b.h*0.065});
            sh.chalkLines.push(fl);
            showShoreHint('朋友来了。点击他，告别');
            // 点击朋友
            const onFriendClick=(e)=>{
              const pp=ptr(e);
              if(Math.hypot(pp.x-sh.personX,pp.y-sh.personY)<VH*0.1){
                fx.removeEventListener('click',onFriendClick);
                fx.removeEventListener('touchend',onFriendClick);
                hideShoreHint();
                setTimeout(()=>this._leaveShore(),1800);
              }
            };
            fx.addEventListener('click',onFriendClick);
            fx.addEventListener('touchend',onFriendClick,{passive:true});
          },800);
        }
      }
    };
    fx.addEventListener('mouseup',endDraw);
    fx.addEventListener('touchstart',e=>{ const p=ptr(e); if(!inBB(p.x,p.y))return; sh.drawing=true; sh._curLine={color:COLORS[sh._chalkIdx%4],pts:[p]}; },{passive:true});
    fx.addEventListener('touchmove',e=>{ if(!sh.drawing||!sh._curLine)return; const p=ptr(e); if(!inBB(p.x,p.y)){sh.drawing=false;return;} sh._curLine.pts.push(p); },{passive:true});
    fx.addEventListener('touchend',endDraw,{passive:true});
  },

  _showCh3Choice(){
    let panel=document.createElement('div');
    panel.id='choice-panel'; panel.className='choice-panel';
    panel.innerHTML=`<button class="choice-btn" onclick="SM._selectCh3Choice('speak')">说出那句话</button>
      <button class="choice-btn alt" onclick="SM._selectCh3Choice('silent')">什么都不说</button>`;
    document.getElementById('s-shore').appendChild(panel);
    setTimeout(()=>{ panel.style.opacity='0'; panel.style.transition='opacity 0.5s'; requestAnimationFrame(()=>{ panel.style.opacity='1'; }); },10);
  },
  _selectCh3Choice(choice){
    this.ch3Choice=choice;
    const panel=document.getElementById('choice-panel');
    if(panel){ panel.style.opacity='0'; setTimeout(()=>panel.remove(),500); }
    if(choice==='speak'){
      showShoreHint('你说出了那句话。对方点了点头，没有说话。');
      this._showWorry(3000);
    } else {
      showShoreHint('什么都没说。但坐在这里，已经够了。');
    }
    setTimeout(()=>{
      this.shore.state='leaving';
      hideShoreHint();
      setTimeout(()=>this._leaveShore(), 2000);
    }, 2800);
  },

  // ── 山野登岸 ──
  _startMountainInteraction(){
    const sh=this.shore;
    sh.personX=VW*0.22; sh.personY=VH*0.78; sh.state='idle';
    sh.petT=0; sh.walkT=0; sh._petX=VW*0.35; sh._petY=VH*0.78;
    sh._interacted=false; sh._petType=this.path==='family'?'cat':'dog';
    showShoreHint('轻触，在山野里走走');
    const fx=document.getElementById('shore-fx');
    fx.onclick=()=>this._onMountainTap();
    fx.ontouchend=()=>this._onMountainTap();
    this._shoreRaf=requestAnimationFrame(()=>this._mountainLoop());
  },
  _onMountainTap(){
    const sh=this.shore;
    if(sh.state==='sitting'&&sh._interacted){
      sh.state='leaving'; hideShoreHint();
      setTimeout(()=>this._leaveShore(),2200); return;
    }
    if(sh.state==='idle'||sh.state==='walking'){
      sh._target=VW*(0.38+Math.random()*0.22); sh.state='walking'; hideShoreHint();
      clearTimeout(sh._sitT);
      sh._sitT=setTimeout(()=>{
        if(sh.state==='walking'||sh.state==='idle'){
          sh.state='sitting'; sh._interacted=true;
          showShoreHint('坐了一会儿。再次轻触，起身离开');
        }
      },2800);
    }
  },
  _mountainLoop(){
    if(this.state!=='shore'){ this._shoreRaf=null; return; }
    const ctx=document.getElementById('shore-fx').getContext('2d');
    const sh=this.shore;
    ctx.clearRect(0,0,VW,VH);
    sh.walkT+=0.1; sh.petT+=0.08;

    if(sh.state==='walking'){
      const dx=(sh._target||VW*0.45)-sh.personX; sh.personX+=dx*0.04;
      if(Math.abs(dx)<4) sh.state='idle';
    } else if(sh.state==='leaving'){
      sh.personX+=1.5; sh.personY+=0.5;
    }

    // 宠物移动
    if(sh._petType==='dog'){
      const ang=sh.petT*0.8, r=sh.state==='sitting'?VW*0.06:VW*0.12;
      sh._petX=sh.personX+Math.cos(ang)*r; sh._petY=sh.personY+Math.sin(ang)*r*0.4;
    } else {
      sh._petX+=(sh.personX+VW*0.08-sh._petX)*0.025;
      sh._petY+=(sh.personY+VH*0.02-sh._petY)*0.025;
    }

    // 影子
    ctx.save(); ctx.filter='blur(3px)'; ctx.fillStyle='rgba(26,20,16,0.06)';
    ctx.beginPath(); ctx.ellipse(sh.personX,sh.personY+4,18,4,0,0,Math.PI*2); ctx.fill();
    ctx.filter='none'; ctx.restore();

    drawPerson(ctx,sh.personX,sh.personY,sh.state,sh.walkT);
    drawPet(ctx,sh._petX,sh._petY,sh._petType,sh.state==='sitting',sh.petT);

    this._shoreRaf=requestAnimationFrame(()=>this._mountainLoop());
  },

  // ── 山顶登岸 ──
  _startSummitInteraction(){
    const sh=this.shore;
    sh._viewPulled=false; sh._worryFloated=false; sh.walkT=0;
    sh.personX=VW*0.5; sh.personY=VH*0.65;
    showShoreHint('站在山顶，轻触俯瞰这片世界');
    const fx=document.getElementById('shore-fx');
    fx.onclick=()=>this._onSummitTap();
    fx.ontouchend=()=>this._onSummitTap();
    this._shoreRaf=requestAnimationFrame(()=>this._summitLoop());
  },
  _onSummitTap(){
    const sh=this.shore;
    if(!sh._viewPulled){
      sh._viewPulled=true; hideShoreHint();
      const bg=document.getElementById('shore-bg');
      bg.style.transition='transform 2.5s cubic-bezier(0.4,0,0.2,1)';
      bg.style.transform='scale(0.72) translateY(-8%)';
      setTimeout(()=>{
        sh._worryFloated=true;
        if(this.boatText){
          const wt=document.getElementById('worry');
          wt.style.left='50%'; wt.style.top='48%';
          wt.style.fontSize='clamp(1.1rem,3.2vw,1.5rem)';
          wt.classList.add('on');
        }
        showShoreHint('渺小不是悲哀。再次轻触，让它随风散去');
      },1800);
    } else if(sh._worryFloated){
      const wt=document.getElementById('worry');
      wt.style.transition='color 2.5s,transform 2.5s,font-size 2s';
      wt.style.color='rgba(200,112,58,0)';
      wt.style.transform='translateX(-50%) translateY(-80%)';
      hideShoreHint();
      document.getElementById('shore-bg').style.transform='';
      setTimeout(()=>this._leaveShore(),3000);
    }
  },
  _summitLoop(){
    if(this.state!=='shore'){ this._shoreRaf=null; return; }
    const ctx=document.getElementById('shore-fx').getContext('2d');
    const sh=this.shore;
    ctx.clearRect(0,0,VW,VH);
    sh.walkT+=0.02;
    drawPerson(ctx,sh.personX,sh.personY,'idle',sh.walkT*2);
    ctx.save(); ctx.filter='blur(3px)'; ctx.fillStyle='rgba(26,20,16,0.07)';
    ctx.beginPath(); ctx.ellipse(sh.personX,sh.personY+6,16,3,0,0,Math.PI*2); ctx.fill();
    ctx.filter='none'; ctx.restore();
    this._shoreRaf=requestAnimationFrame(()=>this._summitLoop());
  },

  // ── 归宿结局 ──
  _startHomeEndInteraction(){
    const ch=CHAPTERS[this.chIdx];
    const story=ch.endStory[this.path]||ch.endStory.family;
    document.getElementById('shore-loc').textContent=story.location;
    document.getElementById('shore-txt').textContent=story.text;
    document.getElementById('shore-next').textContent='这里就是了。';
    document.getElementById('shore-next').onclick=()=>this.go('end');
    document.getElementById('shore-card').classList.add('on');
    // 烦恼文字最终消散
    if(this.boatText){
      const wt=document.getElementById('worry');
      wt.style.left='50%'; wt.style.top=(RM()+22)+'px';
      wt.style.transform='translateX(-50%)';
      wt.classList.add('on');
      setTimeout(()=>{
        wt.style.transition='color 4s ease,transform 4s ease';
        wt.style.color='rgba(200,112,58,0)';
        wt.style.transform='translateX(-50%) translateY(-25px)';
      },1500);
    }
  },

  // ─────────────────────────────────────────
  // END
  // ─────────────────────────────────────────
  _initEnd(){
    Layers.hide();
    Audio.playEndDissipate();
    if(this._shoreRaf){ cancelAnimationFrame(this._shoreRaf); this._shoreRaf=null; }
    document.getElementById('end-quote').textContent='「 '+(this.boatText||'愿它把你带到想去的地方')+' 」';
    setTimeout(()=>document.getElementById('end-ink').style.opacity='1',300);
    setTimeout(()=>{
      document.getElementById('end-quote').classList.add('on');
      document.getElementById('end-sub').classList.add('on');
      document.getElementById('end-seal').classList.add('on');
    },900);
    setTimeout(()=>document.getElementById('btn-restart').classList.add('on'),4600);
  },

  // ─────────────────────────────────────────
  // 粒子
  // ─────────────────────────────────────────
  _spawnParticles(){
    const now=this.waveT, rMid=RM(), rTop=RT(), rBot=RB();
    if(now>this._nFish){
      this._nFish=now+2.2+Math.random()*4;
      this.particles.push({type:'fish',x:Math.random()*VW*0.8+VW*0.1,y:rMid+Math.random()*18-9,vx:1.5+Math.random()*2,vy:-(2+Math.random()*2),life:1,size:4+Math.random()*3});
    }
    if(now>this._nLeaf){
      this._nLeaf=now+1.4+Math.random()*2.5;
      this.particles.push({type:'leaf',x:Math.random()*VW,y:rTop+Math.random()*(rBot-rTop)*0.55,vx:0.3+Math.random()*0.45,vy:0.1+Math.random()*0.18,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.04,life:1,size:5+Math.random()*4});
    }
    if(now>this._nBird){
      this._nBird=now+4+Math.random()*6;
      this.particles.push({type:'bird',x:-20,y:rTop*0.42+Math.random()*rTop*0.3,vx:1.8+Math.random()*1.5,vy:-(0.3+Math.random()*0.4),life:1,wP:0});
    }
  },
  _nFish:0, _nLeaf:0, _nBird:0,
};

const GL={
  ready:false, renderer:null, scene:null, camera:null,
  waterU:null, paperU:null,

  WATER_VERT:`uniform float uTime;uniform float uScrollX;varying vec2 vUv;varying float vWave;void main(){vUv=uv;vec3 pos=position;float w=sin(pos.x*0.018+uTime*1.4+uScrollX*0.002)*0.012+sin(pos.x*0.034+uTime*0.9+uScrollX*0.004)*0.006;vWave=w;pos.y+=w;gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);}`,
  WATER_FRAG:`uniform float uTime;uniform float uScrollX;uniform float uProg;varying vec2 vUv;varying float vWave;float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}void main(){vec3 cool=vec3(0.42,0.60,0.68);vec3 warm=vec3(0.72,0.48,0.28);vec3 base=mix(cool,warm,uProg*0.55);float wv=vUv.x*18.0+uTime*2.2+uScrollX*0.015;float rpl=sin(wv)*0.5+sin(wv*1.73+1.2)*0.3+sin(wv*2.41+2.4)*0.2;rpl=rpl*0.5+0.5;float n=noise(vUv*vec2(40.0,20.0)+vec2(uTime*0.3,0.0));vec3 ochre=vec3(0.784,0.439,0.227);vec3 col=base+ochre*pow(rpl,3.0)*0.35*uProg*0.6;float line=step(0.88,fract(vUv.y*12.0+sin(vUv.x*8.0+uTime)*0.05));float lb=step(0.15,noise(vUv*vec2(60.0,1.0)+uTime*0.1));col+=vec3(1.0)*line*0.055*(1.0-abs(vUv.y-0.5)*2.0)*lb;col+=noise(vUv*200.0)*0.028;float a=0.82+n*0.08;a*=smoothstep(0.0,0.08,vUv.y)*smoothstep(1.0,0.92,vUv.y);gl_FragColor=vec4(col,a);}`,
  PAPER_VERT:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  PAPER_FRAG:`uniform float uProg;varying vec2 vUv;float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}void main(){vec3 paper=vec3(0.957,0.929,0.878);vec3 ochre=vec3(0.784,0.439,0.227);float w=uProg*uProg*0.18;float sf=smoothstep(0.55,1.0,vUv.y);vec3 col=mix(paper,paper+ochre*w,sf);float g=noise(vUv*vec2(180.0))*0.022+noise(vUv*60.0)*0.012;col-=g;float v=1.0-smoothstep(0.3,0.85,length((vUv-0.5)*vec2(1.6,1.2)));col=mix(col,col*0.88,(1.0-v)*0.35);gl_FragColor=vec4(col,1.0);}`,

  init(){
    const canvas=document.getElementById('webgl-canvas');
    this.renderer=new THREE.WebGLRenderer({canvas,alpha:false,antialias:true});
    this.renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    this.renderer.setSize(VW,VH);
    this.scene=new THREE.Scene();
    this.camera=new THREE.OrthographicCamera(-VW/2,VW/2,VH/2,-VH/2,-1,10);
    this.camera.position.z=1;
    // 宣纸背景
    const pg=new THREE.PlaneGeometry(VW,VH);
    this.paperU={uProg:{value:0}};
    const pm=new THREE.ShaderMaterial({vertexShader:this.PAPER_VERT,fragmentShader:this.PAPER_FRAG,uniforms:this.paperU,depthWrite:false});
    const pmesh=new THREE.Mesh(pg,pm); pmesh.name='paper'; pmesh.position.z=-0.5;
    this.scene.add(pmesh);
    // 水面
    this._buildWater();
    this.ready=true;
  },
  _buildWater(){
    const old=this.scene.getObjectByName('river'); if(old) this.scene.remove(old);
    const rTop=RT(),rBot=RB(),rH=rBot-rTop,rMidY=-(rTop+rH/2-VH/2);
    const geo=new THREE.PlaneGeometry(VW*1.5,rH,120,20);
    this.waterU={uTime:{value:0},uScrollX:{value:0},uProg:{value:0}};
    const mat=new THREE.ShaderMaterial({vertexShader:this.WATER_VERT,fragmentShader:this.WATER_FRAG,uniforms:this.waterU,transparent:true,depthWrite:false});
    const mesh=new THREE.Mesh(geo,mat); mesh.name='river'; mesh.position.set(0,rMidY,0);
    this.scene.add(mesh);
  },
  resize(){
    VW=window.innerWidth; VH=window.innerHeight;
    this.renderer.setSize(VW,VH);
    this.camera.left=-VW/2; this.camera.right=VW/2; this.camera.top=VH/2; this.camera.bottom=-VH/2;
    this.camera.updateProjectionMatrix();
    const pm=this.scene.getObjectByName('paper');
    if(pm){pm.geometry.dispose();pm.geometry=new THREE.PlaneGeometry(VW,VH);}
    this._buildWater();
  },
  render(prog,waveT){
    if(!this.ready) return;
    if(this.waterU){ this.waterU.uTime.value=waveT; this.waterU.uScrollX.value=SM.worldX; this.waterU.uProg.value=prog; }
    if(this.paperU) this.paperU.uProg.value=prog;
    this.renderer.render(this.scene,this.camera);
  },
};

// ═══════════════════════════════════════════════════════════════
// Canvas层管理
// ═══════════════════════════════════════════════════════════════
const Layers={
  cvs:{}, ctxs:{},
  offscreen:{},  // 离屏预渲染

  _make(name,z){
    let cv=document.getElementById('layer-'+name);
    if(!cv){ cv=document.createElement('canvas'); cv.id='layer-'+name; cv.style.cssText=`position:fixed;top:0;left:0;pointer-events:none;z-index:${z};transition:opacity 0.4s;`; document.body.appendChild(cv); }
    cv.width=VW; cv.height=VH;
    this.cvs[name]=cv; this.ctxs[name]=cv.getContext('2d');
  },

  build(){
    ['mountain','mist','mid','near','ob','boat','part','fx'].forEach((n,i)=>this._make(n,2+i));
    const rTop=RT(),rBot=RB();
    // 预渲染离屏
    this._buildMountain(rTop);
    this._buildMist(rTop);
    this._buildMid(rTop,rBot);
    this._buildNear(rTop,rBot);
  },

  show(){ Object.values(this.cvs).forEach(c=>c.style.opacity='1'); },
  hide(){ Object.values(this.cvs).forEach(c=>c.style.opacity='0'); },

  render(worldX, waveT){
    const PAR={mountain:0.18,mist:0.32,mid:0.62,near:0.88};
    ['mountain','mist','mid','near'].forEach(n=>{
      const ctx=this.ctxs[n], off=this.offscreen[n];
      if(!ctx||!off) return;
      ctx.clearRect(0,0,VW,VH);
      ctx.drawImage(off, worldX*PAR[n],0,VW,VH, 0,0,VW,VH);
    });
  },

  renderObstacles(worldX, waveT, obstacles){
    const ctx=this.ctxs['ob']; if(!ctx) return;
    ctx.clearRect(0,0,VW,VH);
    const rMid=RM(), rBot=RB();
    obstacles.forEach(ob=>{
      if(ob._gone) return;
      const sx=ob.x-worldX;
      if(sx<-80||sx>VW+80) return;
      if(ob.type==='rock') drawRockOb(ctx,sx,rMid,ob.size);
      else if(ob.type==='weed') drawWeedOb(ctx,sx,rBot,ob.size);
      else if(ob.type==='whirlpool') drawWhirlpoolOb(ctx,sx,rMid,ob.size,waveT);
    });
  },

  renderBoat(worldX, waveT, phys, text){
    const ctx=this.ctxs['boat']; if(!ctx) return;
    ctx.clearRect(0,0,VW,VH);
    const bx=Math.floor(VW*0.30);
    const wave=Math.sin(worldX*0.013+waveT)*6+Math.sin(worldX*0.027+waveT*1.4)*3;
    const by=RM()-28+wave+phys.screenY;
    ctx.save(); ctx.translate(bx,by); ctx.rotate(phys.rot);
    // 影子
    ctx.save(); ctx.filter='blur(4px)'; ctx.fillStyle='rgba(26,20,16,0.11)';
    ctx.beginPath(); ctx.ellipse(4,14,32,6,0,0,Math.PI*2); ctx.fill(); ctx.filter='none'; ctx.restore();
    // 船身
    ctx.beginPath(); ctx.moveTo(-32,10); ctx.bezierCurveTo(-20,-2,20,-2,32,10); ctx.bezierCurveTo(20,20,-20,20,-32,10); ctx.closePath();
    const bg=ctx.createRadialGradient(0,2,0,0,8,36);
    bg.addColorStop(0,'rgba(255,252,244,0.98)'); bg.addColorStop(0.7,'rgba(248,243,232,0.96)'); bg.addColorStop(1,'rgba(238,230,215,0.92)');
    ctx.fillStyle=bg; ctx.fill(); ctx.strokeStyle='rgba(26,20,16,0.3)'; ctx.lineWidth=0.9; ctx.stroke();
    // 帆
    ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(-14,10); ctx.lineTo(0,10); ctx.closePath();
    ctx.fillStyle='rgba(248,243,232,0.88)'; ctx.fill(); ctx.strokeStyle='rgba(26,20,16,0.2)'; ctx.lineWidth=0.75; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(16,6); ctx.lineTo(0,10); ctx.closePath();
    ctx.fillStyle='rgba(244,238,225,0.82)'; ctx.fill(); ctx.strokeStyle='rgba(26,20,16,0.16)'; ctx.lineWidth=0.65; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(0,18); ctx.strokeStyle='rgba(26,20,16,0.09)'; ctx.lineWidth=0.6; ctx.stroke();
    // 船上文字
    if(text){ ctx.font='5px Noto Serif SC,serif'; ctx.fillStyle='rgba(26,20,16,0.33)'; ctx.textAlign='center'; ctx.fillText(text.length>5?text.slice(0,4)+'…':text,0,16); }
    ctx.restore();
  },

  renderParticles(dt, waveT, particles){
    const ctx=this.ctxs['part']; if(!ctx) return;
    ctx.clearRect(0,0,VW,VH);
    const rTop=RT(),rBot=RB();
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i]; p.life-=dt*0.00075;
      if(p.life<=0||p.x>VW+60||p.y<-40||p.y>VH+40){particles.splice(i,1);continue;}
      if(p.type==='fish'){
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.14;
        if(p.y>rTop+(rBot-rTop)*0.7){particles.splice(i,1);continue;}
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(Math.atan2(p.vy,p.vx));
        ctx.beginPath(); ctx.ellipse(0,0,p.size,p.size*0.38,0,0,Math.PI*2); ctx.fillStyle=`rgba(200,112,58,${p.life*0.28})`; ctx.fill(); ctx.restore();
      } else if(p.type==='leaf'){
        p.x+=p.vx; p.y+=p.vy*Math.sin(waveT+p.x*0.02); p.rot+=p.rotV;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.beginPath(); ctx.ellipse(0,0,p.size,p.size*0.42,0,0,Math.PI*2); ctx.fillStyle=`rgba(85,68,35,${p.life*0.18})`; ctx.fill(); ctx.restore();
      } else if(p.type==='bird'){
        p.x+=p.vx; p.y+=p.vy; p.wP+=dt*0.006;
        const wa=Math.sin(p.wP)*0.5;
        ctx.save(); ctx.translate(p.x,p.y); ctx.strokeStyle=`rgba(26,20,16,${p.life*0.3})`; ctx.lineWidth=1.1; ctx.lineCap='round';
        ctx.save(); ctx.rotate(-wa); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,-4); ctx.stroke(); ctx.restore();
        ctx.save(); ctx.rotate(wa); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(10,-4); ctx.stroke(); ctx.restore();
        ctx.restore();
      }
    }
  },

  renderEffects(waveT, phys){
    const ctx=this.ctxs['fx']; if(!ctx) return;
    ctx.clearRect(0,0,VW,VH);
    // 暗流视觉
    if(phys.darkCurrent){

function inkS(ctx,x0,y0,x1,y1,w,a,segs){
  segs=segs||12; const dx=(x1-x0)/segs,dy=(y1-y0)/segs;

}
function inkC(ctx,pts,w,a){
  for(let s=0;s<3;s++){
    ctx.save(); ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);

function drawPerson(ctx,x,y,state,walkT){
  ctx.save();ctx.translate(x,y);

  if(state==='sitting'){
    ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.lineTo(-s*0.28,0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.lineTo(s*0.28,0);ctx.stroke();

  } else {
    ctx.save();ctx.rotate(swing);ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.lineTo(-s*0.22,0);ctx.stroke();ctx.restore();
    ctx.save();ctx.rotate(-swing);ctx.beginPath();ctx.moveTo(0,-s*0.4);ctx.lineTo(s*0.22,0);ctx.stroke();ctx.restore();

  ctx.restore();
}

let _sx=0,_sy=0,_st=0;
document.addEventListener('touchstart',e=>{_sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_st=Date.now();},{passive:true});
document.addEventListener('mousedown',e=>{_sx=e.clientX;_sy=e.clientY;_st=Date.now();});
function _onSwipeEnd(ex,ey){
  if(SM.state!=='drift') return;
  const dx=ex-_sx,dy=ey-_sy,spd=Math.sqrt(dx*dx+dy*dy)/(Date.now()-_st+1)*16;
  const p=SM.phys;
  if(p.whirl){
    if(dx>30&&spd>0.8){ clearTimeout(SM.stuckTimer); p.whirl=false; p.vx=CHAPTERS[SM.chIdx].speed*3.5; p.rotV=-0.15; setHint(''); createRipple(ex,ey); }
  } else if(p.darkCurrent){
    const ok=p.darkDir>0?dy<-25:dy>25;
    if((ok||Math.abs(dx)>30)&&spd>0.5){ clearTimeout(SM.stuckTimer); p.darkCurrent=false; p.vx=CHAPTERS[SM.chIdx].speed*2.2; p.vy*=0.15; setHint(''); createRipple(ex,ey); }
  } else if(SM.stuck){
    if(Math.abs(dx)>22||spd>0.6){ if(p.stuckType==='weed'&&Math.abs(dx)<35)return; SM._unstuck(); p.vy+=dy*-0.08; }
  } else {
    if(Math.abs(dx)<15&&Math.abs(dy)<15){ createRipple(ex,ey); p.vx=Math.min(p.vx+0.4,CHAPTERS[SM.chIdx].speed*1.8); }
  }
}
document.addEventListener('touchend',e=>_onSwipeEnd(e.changedTouches[0].clientX,e.changedTouches[0].clientY),{passive:true});
document.addEventListener('mouseup',e=>_onSwipeEnd(e.clientX,e.clientY));

// 三层：水流环境音 + 风声 + 五声音阶古琴旋律
// ═══════════════════════════════════════════════════════════════
const Audio = {
  ctx: null,
  master: null,       // 主音量节点
  waterGain: null,    // 水声音量
  windGain: null,     // 风声音量
  melodyGain: null,   // 旋律音量
  started: false,
  muted: false,

  // 五声音阶（C调宫调式）频率
  PENTATONIC: [261.63, 293.66, 329.63, 392.00, 440.00,  // C D E G A (低)
               523.25, 587.33, 659.25, 783.99, 880.00],  // C D E G A (高)

  init() {
    if (this.started) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.0;
    this.master.connect(this.ctx.destination);

    // 子混音节点
    this.waterGain  = this._makeGain(0.0);
    this.windGain   = this._makeGain(0.0);
    this.melodyGain = this._makeGain(0.0);

    this._buildWaterSound();
    this._buildWindSound();

    this.started = true;
  },

  _makeGain(val) {
    const g = this.ctx.createGain();
    g.gain.value = val;
    g.connect(this.master);
    return g;
  },

  // ── 淡入淡出 ──
  fadeTo(gainNode, target, duration) {

    gainNode.gain.setValueAtTime(gainNode.gain.value, this.ctx.currentTime);
    gainNode.gain.linearRampToValueAtTime(target, this.ctx.currentTime + duration);
  },

  // ── 启动（用户首次交互后调用）──
  start() {
    if (!this.started) this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
    // 主音量淡入
    this.fadeTo(this.master, 0.85, 2.0);
    // 水声先出来
    this.fadeTo(this.waterGain, 0.7, 1.5);
    // 风声轻一些
    this.fadeTo(this.windGain, 0.3, 2.5);
    // 旋律稍后进入
    setTimeout(() => {
      this.fadeTo(this.melodyGain, 0.5, 2.0);
      this._scheduleMelody();
    }, 3000);
  },

  // ── 章节切换时调整音色 ──
  setChapter(idx) {
    if (!this.started) return;
    const prog = idx / 5;
    // 随章节进展，水声稍变
    this.fadeTo(this.waterGain, 0.55 + prog * 0.2, 3.0);
    // 第六章（归宿）：旋律更轻，环境音更静
    if (idx === 5) {
      this.fadeTo(this.melodyGain, 0.25, 4.0);
      this.fadeTo(this.windGain, 0.15, 4.0);
    }
  },

  playUnstuck() {
    if (!this.started || this.muted) return;
    const t = this.ctx.currentTime;
    // 水花声：宽带噪声短促冲击

    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.5);
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const g = this.ctx.createGain(); g.gain.value = 0.28;
    const bpf = this.ctx.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = 1200; bpf.Q.value = 0.8;
    src.connect(bpf); bpf.connect(g); g.connect(this.master);
    src.start(t); src.stop(t + 0.18);
    // 短促水滴音
    this._playDrop(t + 0.05, 0.18);
    this._playDrop(t + 0.10, 0.14);
  },

  playStuck(type) {

      const g = this.ctx.createGain();

      osc.frequency.setValueAtTime(220, t + 0.4);
      osc.frequency.setValueAtTime(160, t + 0.8);
      g.gain.setValueAtTime(0.18, t); g.gain.linearRampToValueAtTime(0.0, t + 1.2);

      src.buffer = buf;

  // ── 音效：水波涟漪（点击水面）──
  playRipple() {

    const t = this.ctx.currentTime;
    this._playDrop(t, 0.12);
    this._playDrop(t + 0.06, 0.08);
  },

  // ── 音效：故事卡片出现 ──
  playStoryAppear() {
    if (!this.started || this.muted) return;
    const t = this.ctx.currentTime;
    // 轻柔的钟声感
    this._pluckString(this.PENTATONIC[4], t, 0.12); // A4
    setTimeout(() => this._pluckString(this.PENTATONIC[2], t + 0.15, 0.08), 0);
  },

  // ── 音效：登岸（进入shore场景）──
  playShoreArrive() {
    if (!this.started || this.muted) return;
    const t = this.ctx.currentTime;
    // 三音上行
    [0, 0.3, 0.65].forEach((delay, i) => {
      this._pluckString(this.PENTATONIC[i + 2], t + delay, 0.18 - i * 0.03);
    });
  },

  // ── 音效：告别（离开shore）──
  playShoreLeave() {
    if (!this.started || this.muted) return;
    const t = this.ctx.currentTime;
    // 三音下行，渐弱
    [0, 0.35, 0.75].forEach((delay, i) => {
      this._pluckString(this.PENTATONIC[4 - i], t + delay, 0.14 - i * 0.03);
    });
  },

  // ── 音效：结尾（烦恼消散）──
  playEndDissipate() {
    if (!this.started || this.muted) return;
    const t = this.ctx.currentTime;
    // 五音缓慢上行，最后一个长音
    this.PENTATONIC.slice(0, 5).forEach((freq, i) => {
      this._pluckString(freq, t + i * 0.55, 0.22 - i * 0.02);
    });
    // 最后一个音延长衰减
    setTimeout(() => {
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = this.PENTATONIC[5];
      g.gain.setValueAtTime(0.15, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 4.0);
      osc.connect(g); g.connect(this.master);
      osc.start(); osc.stop(this.ctx.currentTime + 4.0);
    }, 2800);
  },

  // ── 内部：拨弦音（古琴感）──
  _pluckString(freq, startTime, gain = 0.15) {
    const ctx = this.ctx;
    // Karplus-Strong 简化版：噪声 → 低通滤波 → 衰减
    const dur = 2.2;

    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;

    const lpf = ctx.createBiquadFilter();

    g.gain.setValueAtTime(gain, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + dur);

    // 微微颤音（古琴揉弦感）
    const vib = ctx.createOscillator();
    vib.frequency.value = 5.5;
    const vibG = ctx.createGain(); vibG.gain.value = freq * 0.008;
    vib.connect(vibG); vibG.connect(lpf.frequency);

    src.connect(lpf); lpf.connect(g); g.connect(this.melodyGain);
    vib.start(startTime); vib.stop(startTime + dur);
    src.start(startTime); src.stop(startTime + dur);
  },

  // ── 内部：水滴音 ──
  _playDrop(startTime, gain = 0.12) {
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800 + Math.random() * 400, startTime);
    osc.frequency.exponentialRampToValueAtTime(200, startTime + 0.12);
    g.gain.setValueAtTime(gain, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.14);
    osc.connect(g); g.connect(this.master);
    osc.start(startTime); osc.stop(startTime + 0.15);
  },

  // ── 水声：褐色噪声过滤模拟流水 ──
  _buildWaterSound() {
    const ctx = this.ctx;
    const bufSize = ctx.sampleRate * 4; // 4秒循环
    const buf = ctx.createBuffer(2, bufSize, ctx.sampleRate);

    // 褐色噪声（比白噪声更像水流）
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      let last = 0;
      for (let i = 0; i < bufSize; i++) {
        const white = Math.random() * 2 - 1;
        last = (last + 0.02 * white) / 1.02;
        d[i] = last * 3.5; // 放大
      }
    }

    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;

    // 低通滤波：保留水流的低频感
    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass'; lpf.frequency.value = 800; lpf.Q.value = 0.5;

    // 带通增强：水流的"咕噜"频段
    const bpf = ctx.createBiquadFilter();
    bpf.type = 'bandpass'; bpf.frequency.value = 320; bpf.Q.value = 1.2;

    // 混合两路
    src.connect(lpf); lpf.connect(this.waterGain);
    src.connect(bpf); bpf.connect(this.waterGain);

    // 轻微的调制（水流不均匀感）
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.08;
    const lfoG = ctx.createGain(); lfoG.gain.value = 0.12;
    lfo.connect(lfoG); lfoG.connect(this.waterGain.gain);

    src.start(); lfo.start();
  },

  // ── 风声：白噪声 + 高通滤波 ──
  _buildWindSound() {
    const ctx = this.ctx;
    const bufSize = ctx.sampleRate * 6;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;

    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;

    // 高通：只保留风的"嘶嘶"高频
    const hpf = ctx.createBiquadFilter();
    hpf.type = 'highpass'; hpf.frequency.value = 1800; hpf.Q.value = 0.3;

    // 慢速调制（风忽大忽小）
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.05;
    const lfoG = ctx.createGain(); lfoG.gain.value = 0.15;
    lfo.connect(lfoG); lfoG.connect(this.windGain.gain);

    src.connect(hpf); hpf.connect(this.windGain);
    src.start(); lfo.start();
  },

  // ── 旋律系统：随机五声音阶，稀疏拨弦 ──
  _melodyRunning: false,
  _scheduleMelody() {
    if (this._melodyRunning || !this.started || this.muted) return;
    this._melodyRunning = true;
    this._nextNote();
  },
  _nextNote() {
    if (!this.started || SM.state === 'end') return;
    // 随机间隔（2.5~8秒），稀疏感
    const interval = 2500 + Math.random() * 5500;
    setTimeout(() => {
      if (!this.started || this.muted) { this._melodyRunning = false; return; }
      // 随机选五声音阶的音
      const notes = this.PENTATONIC;
      const idx = Math.floor(Math.random() * notes.length);
      const freq = notes[idx];
      const t = this.ctx.currentTime;
      this._pluckString(freq, t, 0.10 + Math.random() * 0.08);
      // 偶尔加一个和声（同度高八度，概率30%）
      if (Math.random() < 0.3) {
        this._pluckString(freq * 2, t + 0.08, 0.05);
      }
      // 偶尔加相邻音（概率20%，形成小短句）
      if (Math.random() < 0.2) {
        const idx2 = (idx + (Math.random() < 0.5 ? 1 : -1) + notes.length) % notes.length;
        this._pluckString(notes[idx2], t + 0.4, 0.08);
      }
      this._nextNote();
    }, interval);
  },

  // ── 静音切换 ──
  toggleMute() {
    this.muted = !this.muted;
    this.fadeTo(this.master, this.muted ? 0 : 0.85, 0.5);
    return this.muted;
  },
};

window.addEventListener('load',()=>{ GL.init(); });
</script>
