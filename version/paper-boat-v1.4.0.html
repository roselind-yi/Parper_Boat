<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>纸船漂流 v1.4.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--ink:#1a1410;--ink2:#3d3028;--paper:#f5f0e8;--red:#b5352a;}
html,body{width:100%;height:100%;background:var(--paper);font-family:'Noto Serif SC',serif;overflow:hidden;touch-action:none;}

.phase{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity 0.7s ease;}
.phase.hidden{opacity:0;pointer-events:none;}

/* 标题 */
#phase-title{gap:1.1em;}
.game-title{font-size:clamp(2.6rem,8vw,5rem);font-weight:300;color:var(--ink);letter-spacing:0.35em;position:relative;}
.game-title::after{content:'';position:absolute;bottom:-8px;left:8%;right:8%;height:1px;background:linear-gradient(to right,transparent,rgba(26,20,16,0.4),transparent);}
.game-sub{font-size:0.78rem;color:rgba(26,20,16,0.38);letter-spacing:0.5em;margin-top:0.3em;}
.seal-badge{font-size:0.58rem;color:var(--red);border:1.5px solid var(--red);padding:0.22em 0.55em;letter-spacing:0.18em;opacity:0.78;margin:0.3em 0;}
.btn-ink{background:none;border:1px solid rgba(26,20,16,0.22);color:var(--ink2);font-family:inherit;font-size:0.8rem;letter-spacing:0.28em;padding:0.65em 2em;cursor:pointer;transition:all 0.22s;margin-top:0.8em;}
.btn-ink:hover{background:rgba(26,20,16,0.04);border-color:rgba(26,20,16,0.48);}

/* 写字 */
#phase-write{gap:1.4em;}
.write-hint{font-size:0.78rem;color:rgba(26,20,16,0.38);letter-spacing:0.25em;}
#paper-surface{width:min(310px,88vw);background:rgba(255,253,248,0.96);border:1px solid rgba(26,20,16,0.1);box-shadow:2px 5px 18px rgba(26,20,16,0.09),inset 0 0 35px rgba(200,180,140,0.07);padding:2.2em 2em;position:relative;display:flex;flex-direction:column;gap:0.9em;align-items:center;}
.paper-label{font-size:0.65rem;color:rgba(26,20,16,0.28);letter-spacing:0.22em;align-self:flex-start;}
#boat-text-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(26,20,16,0.13);font-family:'Noto Serif SC',serif;font-size:0.96rem;font-weight:300;color:var(--ink);letter-spacing:0.1em;padding:0.28em 0;text-align:center;outline:none;resize:none;line-height:1.8;}
#boat-text-input::placeholder{color:rgba(26,20,16,0.18);font-size:0.82rem;}
.char-count{font-size:0.58rem;color:rgba(26,20,16,0.18);align-self:flex-end;}

/* 折纸 */
#phase-fold{background:var(--paper);}
#fold-stage{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;}
.fold-label{font-size:0.72rem;color:rgba(26,20,16,0.32);letter-spacing:0.22em;margin-top:1.2em;min-height:1.4em;text-align:center;}

/* 游戏主层 */
#phase-game{z-index:1;display:block;background:transparent;padding:0;}

/* 五个视差层 */
#layer-mountain{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:2;}
#layer-mist    {position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:3;}
#layer-mid     {position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:4;}
#layer-near    {position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:5;}
#layer-water   {position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:6;}
/* 天光叠加层 */
#layer-sky{position:fixed;inset:0;pointer-events:none;z-index:7;transition:background 3s ease;}
/* 粒子层 */
#layer-particles{position:fixed;inset:0;pointer-events:none;z-index:8;}
/* 船 */
#boat-wrap{position:fixed;z-index:20;pointer-events:none;}
#boat-wrap.stuck{animation:stuckWobble 0.45s ease-in-out infinite;}
@keyframes stuckWobble{0%,100%{transform:rotate(-4deg) translateY(0);}50%{transform:rotate(4deg) translateY(-3px);}}
#boat-inner{animation:boatBob 3.5s ease-in-out infinite;}
@keyframes boatBob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-6px) rotate(1.5deg);}}

/* UI */
#progress-bar{position:fixed;top:0;left:0;right:0;height:2px;background:rgba(26,20,16,0.05);z-index:50;}
#progress-fill{height:100%;background:linear-gradient(to right,rgba(26,20,16,0.15),rgba(181,53,42,0.35));width:0%;transition:width 0.4s ease;}
#location-label{position:fixed;top:1.4em;left:50%;transform:translateX(-50%);font-size:0.66rem;color:var(--red);letter-spacing:0.3em;z-index:50;opacity:0;transition:opacity 0.5s;pointer-events:none;}
#location-label.show{opacity:0.8;}
#swipe-hint{position:fixed;bottom:8em;left:50%;transform:translateX(-50%);font-size:0.68rem;color:rgba(26,20,16,0.28);letter-spacing:0.2em;z-index:50;opacity:0;transition:opacity 0.4s;pointer-events:none;}
#swipe-hint.show{opacity:1;}

/* 故事卡片 */
#story-card{position:fixed;bottom:2em;left:50%;transform:translateX(-50%) translateY(18px);width:min(370px,92vw);background:rgba(245,240,232,0.96);border:1px solid rgba(26,20,16,0.1);padding:1.7em 1.9em;opacity:0;pointer-events:none;transition:opacity 0.55s ease,transform 0.55s ease;box-shadow:0 6px 28px rgba(26,20,16,0.1);z-index:50;}
#story-card::before{content:'';position:absolute;top:0;left:1.8em;right:1.8em;height:1px;background:linear-gradient(to right,transparent,rgba(26,20,16,0.18),transparent);}
#story-card.visible{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
.story-location{font-size:0.67rem;color:var(--red);letter-spacing:0.3em;margin-bottom:0.75em;display:flex;align-items:center;gap:0.5em;}
.story-location::before{content:'';width:18px;height:1px;background:var(--red);opacity:0.55;}
.story-text{font-size:0.87rem;line-height:2.05;color:var(--ink2);font-weight:300;}
.story-continue{margin-top:1.1em;font-size:0.68rem;color:rgba(26,20,16,0.28);text-align:right;letter-spacing:0.15em;cursor:pointer;transition:color 0.2s;}
.story-continue:hover{color:rgba(26,20,16,0.55);}

/* 水波ripple */
.ripple-fx{position:fixed;border-radius:50%;border:1px solid rgba(110,155,175,0.45);width:8px;height:8px;pointer-events:none;animation:rippleFx 0.9s ease-out forwards;z-index:25;}
@keyframes rippleFx{to{width:64px;height:64px;margin-left:-28px;margin-top:-28px;opacity:0;}}

/* 结尾 */
#phase-end{z-index:60;background:transparent;}
#end-ink{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(26,20,16,0) 0%,rgba(26,20,16,0.9) 100%);opacity:0;transition:opacity 2.2s ease;}
#end-content{position:relative;z-index:2;text-align:center;padding:2em;}
#end-quote{font-size:clamp(1.05rem,3.5vw,1.5rem);font-weight:300;color:rgba(245,240,232,0);letter-spacing:0.32em;line-height:2.2;transition:color 2.5s ease 1.2s;max-width:480px;}
#end-quote.reveal{color:rgba(245,240,232,0.87);}
#end-sub{font-size:0.67rem;color:rgba(245,240,232,0);letter-spacing:0.4em;margin-top:1.4em;transition:color 2s ease 2.8s;}
#end-sub.reveal{color:rgba(245,240,232,0.38);}
#end-seal{display:inline-block;font-size:0.52rem;color:rgba(181,53,42,0);border:1px solid rgba(181,53,42,0);padding:0.22em 0.5em;margin-top:1.4em;letter-spacing:0.15em;transition:color 1.5s ease 3.8s,border-color 1.5s ease 3.8s;}
#end-seal.reveal{color:rgba(181,53,42,0.65);border-color:rgba(181,53,42,0.45);}
.btn-restart{background:none;border:1px solid rgba(245,240,232,0.18);color:rgba(245,240,232,0);font-family:inherit;font-size:0.7rem;letter-spacing:0.25em;padding:0.58em 1.5em;cursor:pointer;margin-top:2em;transition:color 1.2s ease 4.5s,border-color 1.2s ease 4.5s,background 0.25s;}
.btn-restart.reveal{color:rgba(245,240,232,0.38);border-color:rgba(245,240,232,0.2);}
.btn-restart:hover{background:rgba(245,240,232,0.05);}
</style>
</head>
<body>

<!-- PHASE 1 -->
<div class="phase" id="phase-title">
  <h1 class="game-title">纸船漂流</h1>
  <p class="game-sub">随水而去　随缘而遇</p>
  <div class="seal-badge">童年 · 渠 · 治愈</div>
  <button class="btn-ink" onclick="goToWrite()">折一只船</button>
</div>

<!-- PHASE 2 -->
<div class="phase hidden" id="phase-write">
  <p class="write-hint">在出发前，写一句话给这只船</p>
  <div id="paper-surface">
    <span class="paper-label">——写给这只纸船——</span>
    <textarea id="boat-text-input" placeholder="愿它把你带到想去的地方…" maxlength="20" rows="2"></textarea>
    <span class="char-count" id="char-count">0 / 20</span>
  </div>
  <button class="btn-ink" style="margin-top:1.2em" onclick="goToFold()">折船出发</button>
</div>

<!-- PHASE 3 -->
<div class="phase hidden" id="phase-fold">
  <div id="fold-stage">
    <svg id="fold-svg" width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <p class="fold-label" id="fold-msg">准备折叠…</p>
</div>

<!-- PHASE 4 游戏 -->
<div class="phase hidden" id="phase-game">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="location-label"></div>
  <div id="swipe-hint"></div>

  <!-- 视差层（canvas） -->
  <canvas id="layer-mountain"></canvas>
  <canvas id="layer-mist"></canvas>
  <canvas id="layer-mid"></canvas>
  <canvas id="layer-near"></canvas>
  <canvas id="layer-water"></canvas>

  <!-- 天光叠加 -->
  <div id="layer-sky"></div>

  <!-- 粒子层 -->
  <canvas id="layer-particles"></canvas>

  <!-- 船 -->
  <div id="boat-wrap">
    <div id="boat-inner">
      <svg id="boat-svg" width="80" height="56" viewBox="0 0 80 56" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 38 Q16 28 40 26 Q64 28 76 38 Q62 47 40 46 Q18 47 4 38Z"
              fill="rgba(250,246,240,0.97)" stroke="rgba(26,20,16,0.35)" stroke-width="1.1"/>
        <path d="M40 26 L40 8 L25 24Z" fill="rgba(248,244,238,0.88)" stroke="rgba(26,20,16,0.25)" stroke-width="0.9"/>
        <line x1="40" y1="26" x2="40" y2="46" stroke="rgba(26,20,16,0.12)" stroke-width="0.7"/>
        <line x1="4" y1="38" x2="40" y2="26" stroke="rgba(26,20,16,0.08)" stroke-width="0.5"/>
        <line x1="76" y1="38" x2="40" y2="26" stroke="rgba(26,20,16,0.08)" stroke-width="0.5"/>
        <text id="boat-text-display" x="40" y="40" text-anchor="middle"
              font-family="Noto Serif SC,serif" font-size="5.5"
              fill="rgba(26,20,16,0.4)" letter-spacing="0.3"></text>
      </svg>
    </div>
  </div>

  <!-- 故事卡片 -->
  <div id="story-card">
    <div class="story-location" id="story-location"></div>
    <p class="story-text" id="story-text"></p>
    <div class="story-continue" onclick="dismissStory()">继续漂流 →</div>
  </div>
</div>

<!-- PHASE 5 -->
<div class="phase hidden" id="phase-end">
  <div id="end-ink"></div>
  <div id="end-content">
    <div id="end-quote"></div>
    <div id="end-sub">纸船已漂向远处</div>
    <div id="end-seal">童年 · 渠 · 治愈</div><br>
    <button class="btn-restart" id="btn-restart" onclick="location.reload()">再折一只</button>
  </div>
</div>

<script>
// =============================================
// 全局状态
// =============================================
let boatText = '';
let boatWorldX = 0;      // 船在世界坐标的X（0~WORLD_W）
let gameRunning = false;
let isStuck = false;
let stuckTimer = null;
let storyPaused = false;
let boatSpeed = 1.1;
let raf = null;
let shownScenes = new Set();
let waveT = 0;           // 水波时间
let particleList = [];   // 粒子数组

const WORLD_W = 6000;    // 世界总宽度
const BOAT_SCREEN_X = 0; // 船固定在屏幕左1/3，镜头跟随

// 视差系数（船走1，各层走多少）
const PAR = { mountain:0.18, mist:0.32, mid:0.62, near:0.88, water:1.0 };

// 天光颜色节点（0~1 进度）
const SKY_STOPS = [
  {t:0,   color:'rgba(200,220,235,0.10)'},  // 清晨 冷青
  {t:0.3, color:'rgba(245,235,215,0.08)'},  // 上午 暖白
  {t:0.6, color:'rgba(255,220,160,0.12)'},  // 午后 暖黄
  {t:0.85,color:'rgba(220,140,80,0.18)'},   // 黄昏 橙金
  {t:1.0, color:'rgba(60,50,80,0.25)'},     // 暮色 深蓝紫
];

let VW = window.innerWidth;
let VH = window.innerHeight;
const RIVER_TOP = ()=> VH * 0.50;
const RIVER_BOT = ()=> VH * 0.78;
const RIVER_MID = ()=> (RIVER_TOP()+RIVER_BOT())/2;

// =============================================
// 场景 & 障碍物数据
// =============================================
const scenes = [
  {x:400,  location:'渠边·起点',   text:'清晨的水还凉着。你把纸船放进渠里，它轻轻晃了两下，顺着流走了。岸上有只麻雀歪头看了一眼，又飞走了。'},
  {x:1100, location:'石拱桥下',    text:'桥洞里有回声，流水在里面变得很响。桥墩上长了青苔，湿漉漉的。纸船从桥下钻过去，又出现在另一边的光里。'},
  {x:1900, location:'芦苇荡旁',    text:'芦苇比人还高。风来的时候，它们齐齐低头，又齐齐抬起来。纸船撞进芦苇边缘，打了个转，又漂出来了。'},
  {x:2800, location:'渠心·深水处', text:'水流快了一些，水面起着细碎的皱纹。有几条小鱼跟着纸船游，游了一段，又散开了。'},
  {x:3800, location:'陌生的渠道',  text:'你已经不认识这里了。两边的院子换了样子，有人在晾衣服，没有注意到水面上漂着的纸船。'},
  {x:5000, location:'你回头的地方',text:'脚步停在这里。纸船继续往前漂，你站在岸上看着它越来越小。它替你去了你没有去过的地方。'},
];

const obstacles = [
  {x:650,  type:'rock',      size:24, label:'大石头挡住了，滑动拨开'},
  {x:950,  type:'weed',      size:18, label:'水草缠住了，滑动拨开'},
  {x:1450, type:'whirlpool', size:28, label:'漩涡打转，滑动冲出'},
  {x:2200, type:'rock',      size:20, label:'石头挡着，滑动拨开'},
  {x:2600, type:'weed',      size:16, label:'水草又来了，滑动拨开'},
  {x:3300, type:'whirlpool', size:30, label:'水流打旋，滑动冲出'},
  {x:4100, type:'rock',      size:22, label:'石头，滑动拨开'},
  {x:4600, type:'weed',      size:18, label:'水草，滑动拨开'},
  {x:5200, type:'whirlpool', size:26, label:'最后一个漩涡，冲出去'},
];

// 预绘制场景元素（每层各自记录）
// 各层用离屏canvas预渲染，游戏中只平移
let cvMountain, cvMist, cvMid, cvNear;
let ctxMain; // 水层实时绘制

// =============================================
// Phase 切换
// =============================================
function switchPhase(fromId, toId){
  const f=document.getElementById(fromId), t=document.getElementById(toId);
  f.style.opacity='0';
  setTimeout(()=>{
    f.classList.add('hidden');
    t.classList.remove('hidden');
    t.style.opacity='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      t.style.transition='opacity 0.65s ease'; t.style.opacity='1';
    }));
  },420);
}

function goToWrite(){ switchPhase('phase-title','phase-write'); }

document.getElementById('boat-text-input').addEventListener('input',function(){
  document.getElementById('char-count').textContent=this.value.length+' / 20';
  boatText=this.value;
});

function goToFold(){
  boatText=document.getElementById('boat-text-input').value.trim();
  switchPhase('phase-write','phase-fold');
  setTimeout(runFoldAnimation,500);
}

// =============================================
// 折纸动画
// =============================================
function runFoldAnimation(){
  const svg=document.getElementById('fold-svg');
  const msg=document.getElementById('fold-msg');
  const steps=[
    ()=>{
      msg.textContent='对角折叠…';
      svg.innerHTML=`<g>
        <polygon points="20,160 160,160 20,20" fill="rgba(250,246,240,0.97)" stroke="rgba(26,20,16,0.22)" stroke-width="1.2"/>
        <polygon points="20,20 160,20 160,160" fill="rgba(245,240,232,0.88)" stroke="rgba(26,20,16,0.16)" stroke-width="1"/>
        <line x1="20" y1="20" x2="160" y2="160" stroke="rgba(26,20,16,0.28)" stroke-width="1.2" stroke-dasharray="5,3"/>
      </g>`;
    },
    ()=>{
      msg.textContent='再折一半…';
      svg.innerHTML=`<g>
        <polygon points="90,20 160,160 20,160" fill="rgba(250,246,240,0.97)" stroke="rgba(26,20,16,0.22)" stroke-width="1.2"/>
        <polygon points="90,20 160,160 90,160" fill="rgba(244,239,231,0.88)" stroke="rgba(26,20,16,0.14)" stroke-width="0.9"/>
        <line x1="90" y1="20" x2="90" y2="160" stroke="rgba(26,20,16,0.26)" stroke-width="1.1" stroke-dasharray="5,3"/>
      </g>`;
    },
    ()=>{
      msg.textContent='撑开船型…';
      svg.innerHTML=`<g>
        <path d="M20,145 Q50,130 90,126 Q130,130 160,145 Q130,155 90,153 Q50,155 20,145Z" fill="rgba(250,246,240,0.97)" stroke="rgba(26,20,16,0.32)" stroke-width="1.1"/>
        <path d="M90,126 L62,55 L90,122Z" fill="rgba(246,241,233,0.88)" stroke="rgba(26,20,16,0.22)" stroke-width="0.9"/>
        <path d="M90,126 L118,68 L90,122Z" fill="rgba(248,244,237,0.8)" stroke="rgba(26,20,16,0.17)" stroke-width="0.8"/>
        <line x1="90" y1="126" x2="90" y2="153" stroke="rgba(26,20,16,0.12)" stroke-width="0.7"/>
        <line x1="20" y1="145" x2="90" y2="126" stroke="rgba(26,20,16,0.08)" stroke-width="0.6"/>
        <line x1="160" y1="145" x2="90" y2="126" stroke="rgba(26,20,16,0.08)" stroke-width="0.6"/>
      </g>`;
    },
    ()=>{
      msg.textContent='放入水中 ↓';
      svg.innerHTML=`<g>
        <ellipse cx="90" cy="158" rx="52" ry="5" fill="rgba(110,155,175,0.14)"/>
        <path d="M26,126 Q52,115 90,112 Q128,115 154,126 Q128,136 90,134 Q52,136 26,126Z" fill="rgba(250,246,240,0.97)" stroke="rgba(26,20,16,0.33)" stroke-width="1.1"/>
        <path d="M90,112 L65,50 L90,108Z" fill="rgba(246,241,233,0.9)" stroke="rgba(26,20,16,0.22)" stroke-width="0.9"/>
        <path d="M90,112 L115,64 L90,108Z" fill="rgba(248,244,237,0.82)" stroke="rgba(26,20,16,0.16)" stroke-width="0.8"/>
        <line x1="90" y1="112" x2="90" y2="134" stroke="rgba(26,20,16,0.12)" stroke-width="0.7"/>
      </g>`;
      setTimeout(startGame,900);
    },
  ];
  let i=0;
  const run=()=>{ if(i<steps.length){steps[i]();i++;setTimeout(run,680);} };
  run();
}

// =============================================
// 工具：水墨笔触线（飞白效果）
// =============================================
function inkStroke(ctx, x0,y0,x1,y1, width, alpha, segments){
  // 分段绘制，随机跳过部分（飞白）
  const segs = segments||12;
  const dx=(x1-x0)/segs, dy=(y1-y0)/segs;
  for(let i=0;i<segs;i++){
    if(Math.random()<0.12) continue; // 飞白
    const px0=x0+dx*i+     (Math.random()-0.5)*width*0.4;
    const py0=y0+dy*i+     (Math.random()-0.5)*width*0.25;
    const px1=x0+dx*(i+1)+(Math.random()-0.5)*width*0.4;
    const py1=y0+dy*(i+1)+(Math.random()-0.5)*width*0.25;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(px0,py0);
    ctx.lineTo(px1,py1);
    ctx.strokeStyle=`rgba(26,20,16,${alpha*(0.7+Math.random()*0.6)})`;
    ctx.lineWidth=width*(0.5+Math.random()*0.8);
    ctx.lineCap='round';
    ctx.stroke();
    ctx.restore();
  }
}

// 贝塞尔水墨曲线（带飞白）
function inkCurve(ctx, pts, width, alpha){
  for(let s=0;s<3;s++){
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pts[0][0]+(Math.random()-0.5)*width*0.3, pts[0][1]+(Math.random()-0.5)*width*0.2);
    for(let i=1;i<pts.length-1;i++){
      const mx=(pts[i][0]+pts[i+1][0])/2+(Math.random()-0.5)*width*0.5;
      const my=(pts[i][1]+pts[i+1][1])/2+(Math.random()-0.5)*width*0.3;
      ctx.quadraticCurveTo(pts[i][0]+(Math.random()-0.5)*2, pts[i][1]+(Math.random()-0.5)*2, mx, my);
    }
    const last=pts[pts.length-1];
    ctx.lineTo(last[0]+(Math.random()-0.5)*width*0.3, last[1]+(Math.random()-0.5)*width*0.2);
    ctx.strokeStyle=`rgba(26,20,16,${alpha*(0.6+Math.random()*0.5)})`;
    ctx.lineWidth=width*(0.4+Math.random()*0.9)*(1-s*0.2);
    ctx.lineCap='round';
    // 随机不绘制部分（飞白）
    if(Math.random()>0.15) ctx.stroke();
    ctx.restore();
  }
}

// =============================================
// 预绘制离屏Canvas各层
// =============================================
function buildLayers(){
  VW=window.innerWidth; VH=window.innerHeight;
  const rTop=RIVER_TOP(), rBot=RIVER_BOT();

  // ---- 层1: 远山 ----
  cvMountain=document.createElement('canvas');
  cvMountain.width=Math.ceil(WORLD_W*PAR.mountain)+VW;
  cvMountain.height=VH;
  buildMountainLayer(cvMountain.getContext('2d'), cvMountain.width, VH, rTop);

  // ---- 层2: 远雾树（薄墨） ----
  cvMist=document.createElement('canvas');
  cvMist.width=Math.ceil(WORLD_W*PAR.mist)+VW;
  cvMist.height=VH;
  buildMistLayer(cvMist.getContext('2d'), cvMist.width, VH, rTop);

  // ---- 层3: 中景（竹林、桥、远树） ----
  cvMid=document.createElement('canvas');
  cvMid.width=Math.ceil(WORLD_W*PAR.mid)+VW;
  cvMid.height=VH;
  buildMidLayer(cvMid.getContext('2d'), cvMid.width, VH, rTop, rBot);

  // ---- 层4: 近岸（详细芦苇、岸边） ----
  cvNear=document.createElement('canvas');
  cvNear.width=Math.ceil(WORLD_W*PAR.near)+VW;
  cvNear.height=VH;
  buildNearLayer(cvNear.getContext('2d'), cvNear.width, VH, rTop, rBot);

  // 水层（实时绘制）尺寸设置
  const wc=document.getElementById('layer-water');
  wc.width=VW; wc.height=VH;
  ctxMain=wc.getContext('2d');

  // 粒子层尺寸
  const pc=document.getElementById('layer-particles');
  pc.width=VW; pc.height=VH;

  // 其他canvas尺寸（仅用于视口显示）
  ['layer-mountain','layer-mist','layer-mid','layer-near'].forEach(id=>{
    const c=document.getElementById(id);
    c.width=VW; c.height=VH;
  });
}

// =============================================
// 层1: 远山（水墨多层，虚化）
// =============================================
function buildMountainLayer(ctx, W, H, rTop){
  // 三层山，越远越淡越模糊
  const layers=[
    {amp:100,freq:0.00055,alpha:0.022,blur:6,offsetY:0.88},
    {amp:70, freq:0.0009, alpha:0.032,blur:4,offsetY:0.92},
    {amp:45, freq:0.0016, alpha:0.042,blur:2,offsetY:0.96},
  ];
  layers.forEach(l=>{
    ctx.save();
    if(l.blur) ctx.filter=`blur(${l.blur}px)`;
    ctx.beginPath();
    const baseY=rTop*l.offsetY;
    ctx.moveTo(0,baseY);
    for(let x=0;x<=W;x+=6){
      const y=baseY
        - Math.abs(Math.sin(x*l.freq+0.5))*l.amp
        - Math.abs(Math.sin(x*l.freq*1.8+1.3))*l.amp*0.45
        - Math.abs(Math.sin(x*l.freq*0.6+2.2))*l.amp*0.3;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,rTop); ctx.lineTo(0,rTop); ctx.closePath();
    // 墨色渐变（顶淡底浓）
    const g=ctx.createLinearGradient(0,rTop*0.3,0,rTop);
    g.addColorStop(0,`rgba(30,25,18,0)`);
    g.addColorStop(0.5,`rgba(30,25,18,${l.alpha*0.6})`);
    g.addColorStop(1,`rgba(30,25,18,${l.alpha})`);
    ctx.fillStyle=g;
    ctx.fill();
    ctx.filter='none';
    ctx.restore();

    // 山顶加一圈飞白笔触
    ctx.save();
    if(l.blur) ctx.filter=`blur(${l.blur*0.5}px)`;
    ctx.beginPath();
    const baseY2=rTop*l.offsetY;
    ctx.moveTo(0, baseY2-Math.abs(Math.sin(0*l.freq+0.5))*l.amp);
    for(let x=0;x<=W;x+=8){
      const y=baseY2
        - Math.abs(Math.sin(x*l.freq+0.5))*l.amp
        - Math.abs(Math.sin(x*l.freq*1.8+1.3))*l.amp*0.45
        - Math.abs(Math.sin(x*l.freq*0.6+2.2))*l.amp*0.3;
      ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(26,20,16,${l.alpha*1.4})`;
    ctx.lineWidth=1.2-l.alpha*8;
    ctx.stroke();
    ctx.filter='none';
    ctx.restore();
  });
}

// =============================================
// 层2: 雾气树影（极淡，水墨渲染）
// =============================================
function buildMistLayer(ctx, W, H, rTop){
  // 稀疏的远树剪影，模糊处理
  const treePositions=[];
  for(let x=80;x<W;x+=120+Math.random()*80) treePositions.push(x);

  treePositions.forEach(tx=>{
    const h=50+Math.random()*80;
    const alpha=0.04+Math.random()*0.05;
    const by=rTop - 5;
    ctx.save();
    ctx.filter='blur(3px)';
    // 树冠（用墨晕圆形叠加）
    for(let ci=0;ci<4;ci++){
      ctx.beginPath();
      ctx.arc(tx+(Math.random()-0.5)*20, by-h*0.6+Math.random()*20, 15+Math.random()*25, 0, Math.PI*2);
      ctx.fillStyle=`rgba(26,20,16,${alpha*(0.5+Math.random()*0.5)})`;
      ctx.fill();
    }
    // 树干
    ctx.beginPath();
    ctx.moveTo(tx,by); ctx.lineTo(tx+(Math.random()-0.5)*5, by-h*0.4);
    ctx.strokeStyle=`rgba(26,20,16,${alpha*1.5})`;
    ctx.lineWidth=2+Math.random()*2;
    ctx.stroke();
    ctx.filter='none';
    ctx.restore();
  });
}

// =============================================
// 层3: 中景（竹林、石拱桥）
// =============================================
function buildMidLayer(ctx, W, H, rTop, rBot){
  // 竹林分布
  const bambooGroves=[
    {cx:200, bank:'top', count:6},
    {cx:500, bank:'bot', count:4},
    {cx:900, bank:'top', count:5},
    {cx:1400,bank:'bot', count:5},
    {cx:1800,bank:'top', count:7},
    {cx:2200,bank:'bot', count:4},
    {cx:2600,bank:'top', count:5},
    {cx:3000,bank:'bot', count:6},
    {cx:3500,bank:'top', count:4},
    {cx:3900,bank:'bot', count:5},
    {cx:4300,bank:'top', count:6},
    {cx:4700,bank:'bot', count:4},
  ];
  bambooGroves.forEach(g=>drawBamboo(ctx,g.cx,g.bank,g.count,W,H,rTop,rBot));

  // 石拱桥
  drawBridge(ctx, 1100, rTop, rBot);
  drawBridge(ctx, 2700, rTop, rBot);
  drawBridge(ctx, 4500, rTop, rBot);
}

function riverYAt(x, side, rTop, rBot){
  const base = side==='top' ? rTop : rBot;
  return base + Math.sin(x*0.0014)*10 + Math.sin(x*0.003+1)*5 + Math.sin(x*0.008+2.5)*2.5;
}

function drawBamboo(ctx, cx, bank, count, W, H, rTop, rBot){
  for(let i=0;i<count;i++){
    const bx=cx+(i-count/2)*22+(Math.random()-0.5)*10;
    const h=90+Math.random()*70;
    const by= bank==='top' ? riverYAt(bx,'top',rTop,rBot) : riverYAt(bx,'bot',rTop,rBot);
    const sign= bank==='top' ? -1 : 1;
    const alpha=0.52-i*0.03;
    const nodeH=20+Math.random()*10;

    // 竹竿
    const pts=[];
    for(let n=0;n<=Math.ceil(h/nodeH);n++){
      pts.push([bx+Math.sin(n*1.2)*3, by+sign*n*nodeH]);
    }
    // 主竿（飞白笔触）
    for(let n=0;n<pts.length-1;n++){
      inkStroke(ctx,pts[n][0],pts[n][1],pts[n+1][0],pts[n+1][1], 2.2-i*0.12, alpha, 8);
      // 节点横线
      if(n>0){
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(pts[n][0]-4,pts[n][1]);
        ctx.lineTo(pts[n][0]+4,pts[n][1]);
        ctx.strokeStyle=`rgba(45,62,36,${alpha*0.55})`;
        ctx.lineWidth=0.9;
        ctx.stroke();
        ctx.restore();
      }
    }
    // 竹叶（每2节1组）
    for(let li=0;li<Math.floor(h/nodeH)-1;li++){
      if(Math.random()<0.45) continue;
      const lx=pts[li+1][0], ly=pts[li+1][1];
      const leafCount=2+Math.floor(Math.random()*2);
      for(let k=0;k<leafCount;k++){
        const ang=(Math.random()-0.5)*1.4 + (bank==='top'?-0.2:0.2);
        const ll=16+Math.random()*12;
        ctx.save();
        ctx.translate(lx+(Math.random()-0.5)*14, ly);
        ctx.rotate(ang);
        ctx.beginPath();
        ctx.moveTo(0,0);
        // 水墨叶片：主脉+两侧轮廓
        ctx.bezierCurveTo(ll*0.25,-4+Math.random()*2, ll*0.7,-5+Math.random()*2, ll,0);
        ctx.bezierCurveTo(ll*0.7,4+Math.random()*2, ll*0.25,4+Math.random()*2, 0,0);
        ctx.fillStyle=`rgba(40,62,32,${0.32+Math.random()*0.1})`;
        ctx.fill();
        // 叶脉
        ctx.beginPath();
        ctx.moveTo(0,0); ctx.lineTo(ll,0);
        ctx.strokeStyle=`rgba(40,62,32,${0.18+Math.random()*0.08})`;
        ctx.lineWidth=0.5;
        ctx.stroke();
        ctx.restore();
      }
    }
  }
}

function drawBridge(ctx, cx, rTop, rBot){
  const ty=riverYAt(cx,'top',rTop,rBot);
  const by=riverYAt(cx,'bot',rTop,rBot);
  const bw=100, archH=36;

  ctx.save();
  // 桥体（飞白笔触）
  // 两侧桥墩
  inkStroke(ctx, cx-bw/2-5, ty-18, cx-bw/2-5, by+8, 12, 0.3, 10);
  inkStroke(ctx, cx+bw/2+5, ty-18, cx+bw/2+5, by+8, 12, 0.28, 10);
  // 桥面板
  inkStroke(ctx, cx-bw/2-12, ty-20, cx+bw/2+12, ty-20, 14, 0.32, 18);
  inkStroke(ctx, cx-bw/2-12, ty-14, cx+bw/2+12, ty-14, 6, 0.2, 15);

  // 拱洞（用destination-out掏空）
  ctx.save();
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();
  ctx.ellipse(cx, ty+archH*0.05, bw/2-14, archH-2, 0, Math.PI, 0);
  ctx.fill();
  ctx.restore();

  // 拱线描边（水墨）
  inkCurve(ctx,
    [[cx-bw/2+14,ty],[cx-bw/4,ty-archH+5],[cx,ty-archH],[cx+bw/4,ty-archH+5],[cx+bw/2-14,ty]],
    2.2, 0.38
  );

  // 石块纹理横缝
  ctx.save();
  for(let yi=0;yi<4;yi++){
    inkStroke(ctx, cx-bw/2-12, ty-20+yi*6, cx+bw/2+12, ty-20+yi*6, 0.7, 0.1, 20);
  }
  ctx.restore();

  // 桥两端地面延伸
  inkStroke(ctx, cx-bw/2-30, ty-20, cx-bw/2-12, ty-20, 8, 0.22, 8);
  inkStroke(ctx, cx+bw/2+12, ty-20, cx+bw/2+30, ty-20, 8, 0.2, 8);

  ctx.restore();
}

// =============================================
// 层4: 近岸（芦苇、水草、石头——实际障碍物位置）
// =============================================
function buildNearLayer(ctx, W, H, rTop, rBot){
  // 芦苇群
  const reedSpots=[
    {cx:300, bank:'bot', count:7},
    {cx:600, bank:'top', count:5},
    {cx:1000,bank:'bot', count:8},
    {cx:1300,bank:'top', count:6},
    {cx:1700,bank:'bot', count:9},
    {cx:2000,bank:'top', count:5},
    {cx:2400,bank:'bot', count:7},
    {cx:2900,bank:'top', count:6},
    {cx:3200,bank:'bot', count:8},
    {cx:3700,bank:'top', count:5},
    {cx:4000,bank:'bot', count:7},
    {cx:4400,bank:'top', count:6},
    {cx:4800,bank:'bot', count:8},
  ];
  reedSpots.forEach(r=>drawReedGroup(ctx,r.cx,r.bank,r.count,rTop,rBot));

  // 近岸杂草/矮植物
  for(let x=100;x<W;x+=180+Math.random()*120){
    const bank=Math.random()<0.5?'top':'bot';
    const by= bank==='top' ? riverYAt(x,'top',rTop,rBot) : riverYAt(x,'bot',rTop,rBot);
    const sign= bank==='top' ? -1 : 1;
    for(let k=0;k<3+Math.floor(Math.random()*4);k++){
      const wx=x+(Math.random()-0.5)*30;
      const wh=8+Math.random()*15;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(wx,by);
      ctx.bezierCurveTo(wx+(Math.random()-0.5)*8,by+sign*wh*0.5, wx+(Math.random()-0.5)*6,by+sign*wh*0.85, wx+(Math.random()-0.5)*4,by+sign*wh);
      ctx.strokeStyle=`rgba(55,80,45,${0.22+Math.random()*0.12})`;
      ctx.lineWidth=0.8+Math.random()*0.6;
      ctx.stroke();
      ctx.restore();
    }
  }
}

function drawReedGroup(ctx, cx, bank, count, rTop, rBot){
  for(let i=0;i<count;i++){
    const rx=cx+(i-count/2)*16+(Math.random()-0.5)*8;
    const h=60+Math.random()*50;
    const by= bank==='top' ? riverYAt(rx,'top',rTop,rBot) : riverYAt(rx,'bot',rTop,rBot);
    const sign= bank==='top' ? -1 : 1;
    const alpha=0.42-i*0.025;

    // 茎（弯曲）
    const midX=rx+(Math.random()-0.5)*12;
    const tipX=rx+(Math.random()-0.5)*16;
    const tipY=by+sign*h;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(rx,by);
    ctx.bezierCurveTo(rx+(Math.random()-0.5)*6, by+sign*h*0.35, midX, by+sign*h*0.7, tipX, tipY);
    ctx.strokeStyle=`rgba(85,72,38,${alpha})`;
    ctx.lineWidth=1.1+Math.random()*0.5;
    ctx.lineCap='round';
    ctx.stroke();

    // 穗子（椭圆+飞毛）
    const pLen=10+Math.random()*6;
    const pAng=(Math.random()-0.5)*0.25;
    ctx.save();
    ctx.translate(tipX, tipY+sign*pLen*0.5);
    ctx.rotate(pAng);
    ctx.beginPath();
    ctx.ellipse(0, 0, 2.5+Math.random(), pLen*0.6, 0.05, 0, Math.PI*2);
    ctx.fillStyle=`rgba(75,60,30,${alpha*0.92})`;
    ctx.fill();
    // 飞毛
    for(let m=0;m<5;m++){
      ctx.beginPath();
      const mx=(Math.random()-0.5)*7, my=(Math.random()-0.5)*pLen*0.8;
      ctx.moveTo(mx,my);
      ctx.lineTo(mx+(Math.random()-0.5)*6, my+sign*4);
      ctx.strokeStyle=`rgba(75,60,30,${alpha*0.35})`;
      ctx.lineWidth=0.5;
      ctx.stroke();
    }
    ctx.restore();
    ctx.restore();
  }
}

// =============================================
// 游戏启动
// =============================================
function startGame(){
  switchPhase('phase-fold','phase-game');
  document.getElementById('phase-game').style.display='block';
  VW=window.innerWidth; VH=window.innerHeight;

  buildLayers();

  // 船初始屏幕位置（固定在左1/3偏左）
  const boatScreenX = Math.floor(VW*0.28);
  const boatScreenY = Math.floor(RIVER_MID()-28);
  document.getElementById('boat-wrap').style.left=boatScreenX+'px';
  document.getElementById('boat-wrap').style.top=boatScreenY+'px';
  document.getElementById('boat-wrap').style.position='fixed';

  const disp=boatText.length>6?boatText.slice(0,5)+'…':boatText;
  document.getElementById('boat-text-display').textContent=disp;

  setupInteraction();
  gameRunning=true;
  raf=requestAnimationFrame(gameFrame);
}

// =============================================
// 主游戏帧
// =============================================
let lastT=0;
function gameFrame(t){
  if(!gameRunning) return;
  const dt=Math.min(t-lastT,50); lastT=t;
  waveT+=dt*0.001;

  if(!isStuck&&!storyPaused){
    boatWorldX+=boatSpeed;
    const progress=boatWorldX/WORLD_W;
    document.getElementById('progress-fill').style.width=(progress*100)+'%';
    checkObstacles();
    checkScenes();
    if(boatWorldX>WORLD_W-150){ endJourney(); return; }
  }

  // 渲染各层
  renderLayers();
  updateSkyLight();
  renderParticles(dt);
  spawnParticles();

  // 船的波浪起伏（调整top）
  const wave=Math.sin(boatWorldX*0.013+waveT)*7+Math.sin(boatWorldX*0.027+waveT*1.4)*3.5;
  const boatScreenY=Math.floor(RIVER_MID()-28+wave);
  document.getElementById('boat-wrap').style.top=boatScreenY+'px';

  raf=requestAnimationFrame(gameFrame);
}

// =============================================
// 渲染各视差层
// =============================================
function renderLayers(){
  const layers=[
    {id:'layer-mountain', cv:cvMountain, par:PAR.mountain},
    {id:'layer-mist',     cv:cvMist,     par:PAR.mist},
    {id:'layer-mid',      cv:cvMid,      par:PAR.mid},
    {id:'layer-near',     cv:cvNear,     par:PAR.near},
  ];
  layers.forEach(l=>{
    const c=document.getElementById(l.id);
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,VW,VH);
    const offX=boatWorldX*l.par;
    ctx.drawImage(l.cv, offX,0, VW,VH, 0,0, VW,VH);
  });

  // 水层（实时动态）
  renderWater();
}

// =============================================
// 水层：动态波纹 + 障碍物
// =============================================
function renderWater(){
  const ctx=ctxMain;
  const rTop=RIVER_TOP(), rBot=RIVER_BOT();
  ctx.clearRect(0,0,VW,VH);

  // 河流主体填充
  ctx.save();
  ctx.beginPath();
  for(let x=0;x<=VW;x+=4){
    const wx=x+boatWorldX;
    const ty=rTop+Math.sin(wx*0.0014+waveT)*10+Math.sin(wx*0.003+1+waveT*0.7)*5;
    x===0?ctx.moveTo(x,ty):ctx.lineTo(x,ty);
  }
  ctx.lineTo(VW,rBot); ctx.lineTo(0,rBot); ctx.closePath();
  const wg=ctx.createLinearGradient(0,rTop,0,rBot);
  wg.addColorStop(0,'rgba(130,178,205,0.20)');
  wg.addColorStop(0.45,'rgba(110,160,188,0.27)');
  wg.addColorStop(1,'rgba(88,138,168,0.17)');
  ctx.fillStyle=wg;
  ctx.fill();
  ctx.restore();

  // 上岸线（水墨飞白）
  ctx.save();
  for(let pass=0;pass<3;pass++){
    ctx.beginPath();
    let first=true;
    for(let x=0;x<=VW;x+=5){
      const wx=x+boatWorldX;
      const ty=rTop+Math.sin(wx*0.0014+waveT)*10+Math.sin(wx*0.003+1+waveT*0.7)*5
              +(Math.random()-0.5)*(pass+1)*0.8; // 毛糙感
      if(Math.random()<0.06){first=true;continue;}
      first?(ctx.moveTo(x,ty),first=false):ctx.lineTo(x,ty);
    }
    ctx.strokeStyle=`rgba(48,88,115,${0.35-pass*0.08})`;
    ctx.lineWidth=1.8-pass*0.4;
    ctx.stroke();
  }
  ctx.restore();

  // 下岸线
  ctx.save();
  ctx.beginPath();
  let firstB=true;
  for(let x=0;x<=VW;x+=5){
    const wx=x+boatWorldX;
    const by=rBot+Math.sin(wx*0.0014+waveT+1)*8+Math.sin(wx*0.003+2.5+waveT*0.6)*4;
    if(Math.random()<0.04){firstB=true;continue;}
    firstB?(ctx.moveTo(x,by),firstB=false):ctx.lineTo(x,by);
  }
  ctx.strokeStyle='rgba(45,82,108,0.28)';
  ctx.lineWidth=1.3;
  ctx.stroke();
  ctx.restore();

  // 动态水波纹（多行，随时间流动）
  const rH=rBot-rTop;
  for(let row=0;row<10;row++){
    const rowY=rTop+rH*(0.12+row*0.08);
    // 每行波纹向右流动
    const flowOff=(waveT*30+row*17)%90;
    for(let wx2=(-flowOff);wx2<VW;wx2+=70+row*8){
      const wl=22+row*3+Math.sin(row+wx2)*8;
      const wy=rowY+Math.sin((wx2+boatWorldX)*0.018+waveT+row)*4;
      if(Math.random()<0.1) continue; // 飞白
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(wx2,wy);
      ctx.bezierCurveTo(wx2+wl*0.33,wy-1.5+Math.random()*2, wx2+wl*0.66,wy+1.5+Math.random()*2, wx2+wl,wy);
      ctx.strokeStyle=`rgba(65,115,148,${0.1+Math.random()*0.08})`;
      ctx.lineWidth=0.5+Math.random()*0.4;
      ctx.stroke();
      ctx.restore();
    }
  }

  // 障碍物（水中石/草/漩涡）
  drawObstaclesOnWater(ctx, rTop, rBot);
}

function drawObstaclesOnWater(ctx, rTop, rBot){
  const rMid=(rTop+rBot)/2;
  obstacles.forEach(ob=>{
    if(ob.passed&&ob._gone) return;
    const sx=ob.x - boatWorldX; // 屏幕X
    if(sx<-80||sx>VW+80) return;

    if(ob.type==='rock'){
      // 河中石：体积感
      ctx.save();
      ctx.filter='blur(2px)';
      ctx.fillStyle='rgba(26,20,16,0.1)';
      ctx.beginPath();
      ctx.ellipse(sx+5,rMid+ob.size*0.3+3, ob.size*0.85, ob.size*0.3, 0.1, 0, Math.PI*2);
      ctx.fill();
      ctx.filter='none';

      ctx.beginPath();
      ctx.moveTo(sx-ob.size, rMid+ob.size*0.1);
      ctx.bezierCurveTo(sx-ob.size*0.8,rMid-ob.size*0.55, sx-ob.size*0.15,rMid-ob.size*0.7, sx+ob.size*0.1,rMid-ob.size*0.55);
      ctx.bezierCurveTo(sx+ob.size*0.55,rMid-ob.size*0.65, sx+ob.size*0.9,rMid-ob.size*0.28, sx+ob.size,rMid+ob.size*0.1);
      ctx.bezierCurveTo(sx+ob.size*0.7,rMid+ob.size*0.48, sx-ob.size*0.6,rMid+ob.size*0.48, sx-ob.size,rMid+ob.size*0.1);
      const sg=ctx.createRadialGradient(sx-ob.size*0.3,rMid-ob.size*0.2,0,sx,rMid,ob.size*1.1);
      sg.addColorStop(0,'rgba(88,78,65,0.75)');
      sg.addColorStop(0.65,'rgba(58,50,40,0.68)');
      sg.addColorStop(1,'rgba(38,32,25,0.55)');
      ctx.fillStyle=sg;
      ctx.fill();
      // 高光
      ctx.beginPath();
      ctx.ellipse(sx-ob.size*0.28,rMid-ob.size*0.22, ob.size*0.22, ob.size*0.1, -0.4, 0, Math.PI*2);
      ctx.fillStyle='rgba(255,250,240,0.2)';
      ctx.fill();
      // 石头周围水纹
      for(let ri=1;ri<=4;ri++){
        ctx.beginPath();
        ctx.ellipse(sx, rMid+ob.size*0.12, ob.size*(0.85+ri*0.42), ob.size*(0.22+ri*0.07), 0, 0, Math.PI*2);
        ctx.strokeStyle=`rgba(80,128,158,${0.18-ri*0.03})`;
        ctx.lineWidth=0.6;
        ctx.stroke();
      }
      ctx.restore();

    } else if(ob.type==='weed'){
      // 水中草
      const count=4+Math.floor(ob.size/5);
      for(let i=0;i<count;i++){
        const wx=sx+(i-count/2)*14+(Math.random()*4-2);
        const wh=16+Math.random()*20;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(wx,rBot-6);
        ctx.bezierCurveTo(wx+(Math.random()-0.5)*12,rBot-wh*0.45, wx+(Math.random()-0.5)*10,rBot-wh*0.8, wx+(Math.random()-0.5)*6,rBot-wh);
        ctx.strokeStyle=`rgba(48,88,52,${0.28+Math.random()*0.1})`;
        ctx.lineWidth=1.1+Math.random()*0.5;
        ctx.lineCap='round';
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(wx+(Math.random()-0.5)*8, rBot-wh-4+Math.random()*5, 6+Math.random()*4, 2.5, (Math.random()-0.5)*0.8, 0, Math.PI*2);
        ctx.fillStyle=`rgba(48,88,52,0.2)`;
        ctx.fill();
        ctx.restore();
      }

    } else if(ob.type==='whirlpool'){
      // 漩涡：旋转螺旋线（用waveT驱动）
      ctx.save();
      ctx.translate(sx, rMid);
      for(let s=0;s<6;s++){
        const r=6+s*8;
        const startAng=waveT*2.2+s*0.5; // 旋转
        ctx.beginPath();
        for(let a=startAng;a<=startAng+Math.PI*1.6;a+=0.12){
          const rad=r*(1-(a-startAng)/(Math.PI*8));
          const px=rad*Math.cos(a);
          const py=rad*0.45*Math.sin(a);
          a===startAng?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.strokeStyle=`rgba(65,118,155,${0.2-s*0.025})`;
        ctx.lineWidth=1.1-s*0.1;
        ctx.stroke();
      }
      // 中心小圆
      ctx.beginPath();
      ctx.arc(0,0,2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(65,118,155,0.25)';
      ctx.fill();
      ctx.restore();
    }
  });
}

// =============================================
// 天光变化
// =============================================
function updateSkyLight(){
  const p=boatWorldX/WORLD_W;
  let color='rgba(200,220,235,0.10)';
  for(let i=0;i<SKY_STOPS.length-1;i++){
    const a=SKY_STOPS[i], b=SKY_STOPS[i+1];
    if(p>=a.t&&p<=b.t){
      const t=(p-a.t)/(b.t-a.t);
      // 简单用CSS渐变叠加
      color=b.color; // 粗略切换，足够有感知
      break;
    }
  }
  document.getElementById('layer-sky').style.background=
    `radial-gradient(ellipse at 50% 0%, ${color} 0%, transparent 70%)`;
}

// =============================================
// 粒子系统（小鱼、落叶、飞鸟）
// =============================================
let nextFishT=0, nextLeafT=0, nextBirdT=0;
function spawnParticles(){
  const now=waveT;
  const rTop=RIVER_TOP(), rBot=RIVER_BOT();
  const rMid=(rTop+rBot)/2;

  if(now>nextFishT&&!isStuck&&!storyPaused){
    nextFishT=now+2+Math.random()*4;
    // 小鱼跳出（短暂弧线）
    particleList.push({
      type:'fish',
      x:Math.random()*VW*0.8+VW*0.1,
      y:rMid+Math.random()*20-10,
      vx:1.5+Math.random()*2,
      vy:-(2+Math.random()*2),
      life:1.0,
      size:4+Math.random()*3,
    });
  }
  if(now>nextLeafT){
    nextLeafT=now+1.5+Math.random()*3;
    // 落叶在水面漂
    particleList.push({
      type:'leaf',
      x:Math.random()*VW,
      y:rTop+Math.random()*(rBot-rTop)*0.6,
      vx:0.3+Math.random()*0.5,
      vy:0.1+Math.random()*0.2,
      rot:Math.random()*Math.PI*2,
      rotV:(Math.random()-0.5)*0.04,
      life:1.0,
      size:5+Math.random()*4,
    });
  }
  if(now>nextBirdT){
    nextBirdT=now+4+Math.random()*6;
    // 飞鸟（V形两笔，从远处飞过）
    particleList.push({
      type:'bird',
      x:-20,
      y:RIVER_TOP()*0.45+Math.random()*RIVER_TOP()*0.3,
      vx:1.8+Math.random()*1.5,
      vy:-(0.3+Math.random()*0.4),
      life:1.0,
      wing:0, wPhase:0,
    });
  }
}

function renderParticles(dt){
  const pc=document.getElementById('layer-particles');
  const ctx=pc.getContext('2d');
  ctx.clearRect(0,0,VW,VH);
  const rTop=RIVER_TOP(), rBot=RIVER_BOT();

  for(let i=particleList.length-1;i>=0;i--){
    const p=particleList[i];
    p.life-=dt*0.0008;
    if(p.life<=0||p.x>VW+60||p.y<-40||p.y>VH+40){
      particleList.splice(i,1); continue;
    }

    if(p.type==='fish'){
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; // 抛物线
      if(p.y>rTop+(rBot-rTop)*0.7) { particleList.splice(i,1); continue; }
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(Math.atan2(p.vy,p.vx));
      ctx.beginPath();
      ctx.ellipse(0,0,p.size,p.size*0.4,0,0,Math.PI*2);
      ctx.fillStyle=`rgba(70,120,148,${p.life*0.45})`;
      ctx.fill();
      // 鱼尾
      ctx.beginPath();
      ctx.moveTo(-p.size,0);
      ctx.lineTo(-p.size-5,-3); ctx.lineTo(-p.size-5,3); ctx.closePath();
      ctx.fillStyle=`rgba(60,108,135,${p.life*0.38})`;
      ctx.fill();
      ctx.restore();

    } else if(p.type==='leaf'){
      p.x+=p.vx; p.y+=p.vy*Math.sin(waveT+p.x*0.02);
      p.rot+=p.rotV;
      ctx.save();
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.beginPath();
      ctx.ellipse(0,0,p.size,p.size*0.45,0,0,Math.PI*2);
      ctx.fillStyle=`rgba(85,68,35,${p.life*0.22})`;
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-p.size,0); ctx.lineTo(p.size,0);
      ctx.strokeStyle=`rgba(85,68,35,${p.life*0.15})`;
      ctx.lineWidth=0.5; ctx.stroke();
      ctx.restore();

    } else if(p.type==='bird'){
      p.x+=p.vx; p.y+=p.vy;
      p.wPhase+=dt*0.006;
      const wAng=Math.sin(p.wPhase)*0.5; // 翅膀扑动
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.strokeStyle=`rgba(26,20,16,${p.life*0.38})`;
      ctx.lineWidth=1.1; ctx.lineCap='round';
      // 左翅
      ctx.save(); ctx.rotate(-wAng);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,-4); ctx.stroke();
      ctx.restore();
      // 右翅
      ctx.save(); ctx.rotate(wAng);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(10,-4); ctx.stroke();
      ctx.restore();
      ctx.restore();
    }
  }
}

// =============================================
// 障碍物 & 场景检测
// =============================================
function checkObstacles(){
  for(let ob of obstacles){
    if(ob.passed) continue;
    if(Math.abs(boatWorldX-ob.x)<40){
      ob.passed=true;
      isStuck=true;
      document.getElementById('boat-wrap').classList.add('stuck');
      document.getElementById('swipe-hint').textContent=ob.label;
      document.getElementById('swipe-hint').classList.add('show');
      stuckTimer=setTimeout(()=>{ if(isStuck)unstuck(); },4500);
      break;
    }
  }
}
function unstuck(){
  isStuck=false;
  document.getElementById('boat-wrap').classList.remove('stuck');
  document.getElementById('swipe-hint').classList.remove('show');
  clearTimeout(stuckTimer);
  const orig=boatSpeed;
  boatSpeed=3.2;
  setTimeout(()=>{ boatSpeed=orig; },700);
  createRipple();
}
function checkScenes(){
  for(let i=0;i<scenes.length;i++){
    if(shownScenes.has(i)) continue;
    const sc=scenes[i];
    if(boatWorldX>sc.x&&boatWorldX<sc.x+55){
      shownScenes.add(i);
      storyPaused=true;
      document.getElementById('story-location').textContent=sc.location;
      document.getElementById('story-text').textContent=sc.text;
      document.getElementById('story-card').classList.add('visible');
      showLocationLabel(sc.location);
    }
  }
}
function dismissStory(){
  document.getElementById('story-card').classList.remove('visible');
  setTimeout(()=>{ storyPaused=false; },300);
}
function showLocationLabel(txt){
  const el=document.getElementById('location-label');
  el.textContent=txt; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// =============================================
// 交互
// =============================================
function setupInteraction(){
  let sx=0;
  const onStart=e=>{ sx=e.touches?e.touches[0].clientX:e.clientX; };
  const onEnd=e=>{
    const ex=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
    if(isStuck&&Math.abs(ex-sx)>18) unstuck();
    else if(!isStuck) createRipple(ex, e.changedTouches?e.changedTouches[0].clientY:e.clientY);
  };
  document.addEventListener('touchstart',onStart,{passive:true});
  document.addEventListener('touchend',onEnd,{passive:true});
  document.addEventListener('mousedown',onStart);
  document.addEventListener('mouseup',onEnd);
}
function createRipple(x,y){
  const r=document.createElement('div');
  r.className='ripple-fx';
  const bw=document.getElementById('boat-wrap');
  const rect=bw.getBoundingClientRect();
  r.style.left=(x||rect.left+40)+'px';
  r.style.top=(y||rect.top+28)+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),950);
}

// =============================================
// 结尾
// =============================================
function endJourney(){
  gameRunning=false;
  if(raf) cancelAnimationFrame(raf);
  setTimeout(()=>{
    document.getElementById('phase-game').classList.add('hidden');
    const ep=document.getElementById('phase-end');
    ep.classList.remove('hidden');
    ep.style.opacity='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      ep.style.transition='opacity 0.7s ease'; ep.style.opacity='1';
    }));
    document.getElementById('end-quote').textContent='「 '+(boatText||'愿它把你带到想去的地方')+' 」';
    setTimeout(()=>document.getElementById('end-ink').style.opacity='1',300);
    setTimeout(()=>{
      document.getElementById('end-quote').classList.add('reveal');
      document.getElementById('end-sub').classList.add('reveal');
      document.getElementById('end-seal').classList.add('reveal');
    },900);
    setTimeout(()=>document.getElementById('btn-restart').classList.add('reveal'),4600);
  },700);
}
